version = "v2-2024"

[deploy.native]
platforms = ["linux", "macos", "windows", "ios", "android"]
runtime = "embedded"

[[model_preset]]
id = "mivolo-v2-imdb"
display_name = "MiVOLO v2 (IMDB)"
repo = "WildChlamydia/MiVOLO"
recommended = true
