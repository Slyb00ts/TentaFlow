[bundle]
engine = "voxcpm"
description = "VoxCPM2 TTS"
python_version = "3.11"
source = "git"
git_repo = "https://github.com/OpenBMB/VoxCPM.git"
git_ref = "main"

[launch]
command = "uvicorn"
args = ["--app-dir", "${BUNDLE_DIR}", "server:app",
        "--host", "127.0.0.1", "--port", "8086"]
internal_port = 8086

[requires]
cuda = ">=12.1"
gpu_memory_gb = 4
disk_gb = 6
platforms = ["linux-x86_64"]
