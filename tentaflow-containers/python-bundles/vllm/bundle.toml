# =============================================================================
# Plik: python-bundles/vllm/bundle.toml
# Opis: vLLM z git HEAD, wieloplatformowo (CUDA / ROCm 7 / Metal).
# =============================================================================

[bundle]
engine = "vllm"
description = "vLLM OpenAI-compatible LLM server (git HEAD)"
python_version = "3.12"
source = "git"
git_repo = "https://github.com/vllm-project/vllm.git"
git_ref = "main"

[launch]
command = "python"
args = [
    "-m", "vllm.entrypoints.openai.api_server",
    "--host", "127.0.0.1",
    "--port", "8000",
    "--model", "${MODEL}",
    "--dtype", "auto",
    "--gpu-memory-utilization", "${GPU_MEMORY_UTILIZATION:-0.9}",
    "--max-model-len", "${MAX_MODEL_LEN:-8192}",
]
internal_port = 8000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64", "macos-aarch64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "VLLM_TARGET_DEVICE=rocm"

[[install_variants]]
backend = "metal"
extras = ["vllm-metal"]
install_hint = "VLLM_TARGET_DEVICE=metal"
