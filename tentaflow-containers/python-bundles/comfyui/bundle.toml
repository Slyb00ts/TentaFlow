[bundle]
engine = "comfyui"
description = "ComfyUI Stable Diffusion / Flux (git HEAD)"
python_version = "3.12"
source = "git"
git_repo = "https://github.com/comfyanonymous/ComfyUI.git"
git_ref = "master"

[launch]
command = "python"
args = ["${BUNDLE_DIR}/ComfyUI/main.py",
        "--listen", "127.0.0.1", "--port", "8188"]
internal_port = 8188

[requires]
gpu_memory_gb = 6
disk_gb = 15
platforms = ["linux-x86_64", "linux-aarch64", "macos-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []

[[install_variants]]
backend = "metal"
extras = []
