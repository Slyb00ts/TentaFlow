# =============================================================================
# Plik: config.default.toml
# Opis: Fallback configu sidecara - nadpisany przez /data/config.toml
#       generowany przez tentaflow-core/src/deploy/runner.rs przy deployu.
# =============================================================================
service_name = "stt-whisper"
model_aliases = []

[transport]
port = 5000
enable_lan_discovery = false
enable_dht_discovery = false

[role]
kind = "reverse_proxy"
upstream_url = "http://127.0.0.1:8081/v1"
api = "open_ai"
timeout_ms = 120000
