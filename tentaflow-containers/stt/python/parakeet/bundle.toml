[bundle]
engine = "parakeet"
description = "NVIDIA NeMo Parakeet-TDT-0.6B-v3 (STT, git HEAD)"
python_version = "3.12"
source = "git"
git_repo = "https://github.com/NVIDIA/NeMo.git"
git_ref = "main"

[launch]
command = "uvicorn"
args = ["--app-dir", "${BUNDLE_DIR}", "server:app",
        "--host", "127.0.0.1", "--port", "${PORT:-8082}"]
internal_port = 8082

[requires]
gpu_memory_gb = 4
disk_gb = 12
# NeMo jest oficjalnie CUDA-only; ROCm ma ograniczone wsparcie eksperymentalne.
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
# Pinned na 2.6.2 (Feb 2026) — wspiera Parakeet-TDT-0.6B-v3 multilingual.
extras = ["nemo_toolkit[asr]==2.6.2"]

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = ["nemo_toolkit[asr]==2.6.2"]
install_hint = "experimental"
