[bundle]
engine = "sglang"
description = "SGLang serwer LLM z structured outputs (git HEAD)"
python_version = "3.12"
source = "git"
git_repo = "https://github.com/sgl-project/sglang.git"
git_ref = "main"
install_subdir = "python"

[launch]
command = "python"
args = [
    "-m", "sglang.launch_server",
    "--model-path", "${MODEL}",
    "--host", "127.0.0.1",
    "--port", "${PORT:-30000}",
    "--tp", "${TP:-1}",
    "--mem-fraction-static", "${MEM_FRACTION:-0.85}",
]
internal_port = 30000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "SGLANG_BACKEND=rocm"
