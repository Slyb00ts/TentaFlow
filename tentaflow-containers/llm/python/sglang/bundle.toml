[bundle]
engine = "sglang"
description = "SGLang serwer LLM z structured outputs (PyPI)"
python_version = "3.12"
# Editable install z git'owej HEAD (install_subdir=python) nie eksponowal
# top-level pakietu `sglang` — `python -m sglang.launch_server` rzucal
# ModuleNotFoundError. PyPI wheel `sglang[all]` instaluje pakiet poprawnie
# wraz z extras (sgl-kernel, openai, anthropic), ten sam wzorzec dziala w
# referencyjnym kontenerze lmsysorg/sglang z naszego dotnetowego stacka.
source = "pypi"
pypi_package = "sglang[all]"

[launch]
command = "python"
args = [
    "-m", "sglang.launch_server",
    "--model-path", "${MODEL}",
    "--host", "127.0.0.1",
    "--port", "${PORT:-30000}",
    "--tp", "${TP:-1}",
    "--mem-fraction-static", "${MEM_FRACTION:-0.85}",
    "--attention-backend", "triton",
    "--sampling-backend", "pytorch",
]
internal_port = 30000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "SGLANG_BACKEND=rocm"
