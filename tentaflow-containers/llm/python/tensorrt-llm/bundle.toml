# =============================================================================
# Plik: python-bundles/tensorrt-llm/bundle.toml
# Opis: TensorRT-LLM (NVIDIA) jako native bundle. Pinned na 1.2.0 (stable)
#       — 1.3.0rc12 jest pre-release (kwiecien 2026), nie na produkcje.
#       Pakiet `tensorrt_llm` z PyPI wystawia `tensorrt_llm.serve.openai_server`
#       z OpenAI-compatible API. Linux-only, CUDA 12.x + cudnn 9.x.
# =============================================================================

[bundle]
engine = "tensorrt-llm"
description = "NVIDIA TensorRT-LLM OpenAI-compatible server (PyPI, pinned 1.2.0)"
python_version = "3.12"
source = "pypi"
pypi_package = "tensorrt-llm==1.2.0"

[launch]
command = "python"
args = [
    "-m", "tensorrt_llm.serve.openai_server",
    "--host", "127.0.0.1",
    "--port", "${PORT:-8087}",
    "--model", "${MODEL}",
    "--tp_size", "${TP:-1}",
    "--max_batch_size", "${MAX_BATCH_SIZE:-8}",
    "--kv_cache_free_gpu_memory_fraction", "${KV_FRACTION:-0.85}",
]
internal_port = 8087

[requires]
gpu_memory_gb = 12
disk_gb = 30
platforms = ["linux-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://pypi.nvidia.com"
extras = []
