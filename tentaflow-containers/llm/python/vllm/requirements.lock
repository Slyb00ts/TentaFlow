# Pinowane wheels dla bundla vLLM.
# Regenerujemy komenda:
#   uv pip compile --python 3.11 --output-file requirements.lock pyproject.toml
# (albo rownoznacznie: `uv pip install vllm; uv pip freeze`)
#
# Dla source = "git" ten plik jest fallbackiem — faktyczne rozwiazanie deps
# odbywa sie przez `pip install -e .` z klona repo. Ta lock sluzy do
# pre-cache'owania wheels torch/xformers/flash-attn przed bootstrapem.

# Core — bez sufixu `+cu130` zeby `--extra-index-url` z bundle.toml
# install_variants zadecydowal ktora wariant wheela uv pobierze:
#   * variant `cuda` + extra_index cu130 -> torch-2.11.0+cu130-cp3X-manylinux_2_28_<arch>.whl
#   * variant `rocm` + extra_index rocm  -> torch-2.11.0+rocmX.Y-...
#   * variant `cpu`  (brak extra_index)  -> torch-2.11.0-...-manylinux_2_28_<arch> (CPU)
# vLLM 0.20.0 wymaga PyTorch 2.11 jako baseline; cu130 wheels istnieja dla
# x86_64 i aarch64 (potrzebne dla DGX Spark / Grace Blackwell).
torch==2.11.0
torchvision==0.26.0
torchaudio==2.11.0

# vLLM deps (pobierane z https://github.com/vllm-project/vllm/blob/main/requirements-cuda.txt)
# Sidecar python_venv pobiera je wprost z requirements-cuda.txt HEAD;
# ten plik tylko aktualizuje kilka najciezszych wheels do wstepnego cache.

