# =============================================================================
# Plik: python-bundles/vllm/bundle.toml
# Opis: vLLM jako PyPI pinned (0.20.1, kwiecien 2026). Dla macOS Apple
#       Silicon uzywamy osobnego silnika `vllm-metal` (bundle
#       ../vllm-metal/bundle.toml) — plugin MLX, inny flow instalacji.
# =============================================================================

[bundle]
engine = "vllm"
description = "vLLM OpenAI-compatible LLM server (PyPI, pinned 0.20.1)"
python_version = "3.12"
# Pinned na 0.20.1 (2026-04-27): NVFP4 emulacja, Gemma 4 quantized MoE,
# PyTorch 2.11 + CUDA 13.0 default. Switch z git HEAD na PyPI dla
# reproducibility — git main moze rozjechac sie z innymi deps.
source = "pypi"
pypi_package = "vllm==0.20.1"

[launch]
command = "python"
# Bundle dostarcza identity flags (model + transport) i bezpieczne baseline
# defaults dla flag, ktore vllm bez explicit wartosci dobiera nieoptymalnie
# albo crashuje (np. multimodal Gemma 4 31B-VL wymaga --max-num-batched-tokens
# >= 2496). `--gpu-memory-utilization` celowo NIE jest tu — backend
# (`python_bundle.rs::prepare`) zarzadza ta jedyna flaga (auto-clamp wzgledem
# free VRAM / user explicit z wizarda) i appenduje do VLLM_ARGS jako
# pojedyncze wystapienie. VLLM_ARGS z wizarda Advanced jest appendowane PO
# tych flagach przez `build_engine_args`, wiec last-wins dla flag pokrywanych
# przez wizard.
args = [
    "-m", "vllm.entrypoints.openai.api_server",
    "--host", "127.0.0.1",
    "--port", "${PORT:-8000}",
    "--model", "${MODEL}",
    "--dtype", "auto",
    "--max-model-len", "${MAX_MODEL_LEN:-8192}",
    "--max-num-batched-tokens", "${MAX_NUM_BATCHED_TOKENS:-8192}",
    # Performance baseline — wlaczone domyslnie dla kazdej platformy:
    #  * prefix-caching: drastycznie obniza TTFT przy powtarzalnych promptach
    #    (system prompts, RAG context). Bezpieczne, samo-wylaczalne dla
    #    multimodal modeli na poziomie vllm.
    #  * chunked-prefill: -50% TTFT przy duzym kontekscie. Vllm sam wylacza
    #    dla VL modeli (no-op tam, brak szkody).
    "--enable-prefix-caching",
    "--enable-chunked-prefill",
    # FlashInfer autotune wybiera najlepsze CUDA kernele per (shape, dtype,
    # arch) przy pierwszym starcie i cache'uje wynik. +30-60s na cold start,
    # zauwazalna poprawa throughputu na Hopper/Blackwell (na starszych
    # Ampere/Turing zysk marginalny). vLLM ignoruje gdy backend != FlashInfer.
    "--enable-flashinfer-autotune",
]
internal_port = 8000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu130"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "VLLM_TARGET_DEVICE=rocm"
