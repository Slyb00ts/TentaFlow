# =============================================================================
# Plik: python-bundles/vllm/bundle.toml
# Opis: vLLM jako PyPI pinned (0.20.0, kwiecien 2026). Dla macOS Apple
#       Silicon uzywamy osobnego silnika `vllm-metal` (bundle
#       ../vllm-metal/bundle.toml) — plugin MLX, inny flow instalacji.
# =============================================================================

[bundle]
engine = "vllm"
description = "vLLM OpenAI-compatible LLM server (PyPI, pinned 0.20.0)"
python_version = "3.12"
# Pinned na 0.20.0 (2026-04-27): NVFP4 emulacja, Gemma 4 quantized MoE,
# PyTorch 2.11 + CUDA 13.0 default. Switch z git HEAD na PyPI dla
# reproducibility — git main moze rozjechac sie z innymi deps.
source = "pypi"
pypi_package = "vllm==0.20.0"

[launch]
command = "python"
# Defaulty zgodne z docker entrypoint vllm:
# --max-num-batched-tokens 8192 jest WYMAGANE dla multimodalnych modeli
# (Gemma 4 31B-VL ma max_tokens_per_mm_item = 2496, default vllm 2048
# powoduje crash MultiModalBudget). User moze nadpisac wszystkie te wartosci
# poprzez VLLM_ARGS env z deploy wizard Advanced section (build_engine_args
# w spawn_engine appenduje VLLM_ARGS post tych args). Auto-detect TP/PP
# jest robione w docker entrypoint przez nvidia-smi -L; dla bundle native
# user musi explicit ustawic --tensor-parallel-size przez VLLM_ARGS gdy
# chce uzyc multi-GPU (deploy wizard Advanced robi to automatycznie).
args = [
    "-m", "vllm.entrypoints.openai.api_server",
    "--host", "127.0.0.1",
    "--port", "${PORT:-8000}",
    "--model", "${MODEL}",
    "--dtype", "auto",
    "--gpu-memory-utilization", "${GPU_MEMORY_UTILIZATION:-0.9}",
    "--max-model-len", "${MAX_MODEL_LEN:-8192}",
    "--max-num-batched-tokens", "${MAX_NUM_BATCHED_TOKENS:-8192}",
]
internal_port = 8000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu130"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "VLLM_TARGET_DEVICE=rocm"
