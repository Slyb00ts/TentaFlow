# =============================================================================
# Plik: python-bundles/vllm/bundle.toml
# Opis: vLLM jako PyPI pinned (0.19.1, kwiecien 2026). Dla macOS Apple
#       Silicon uzywamy osobnego silnika `vllm-metal` (bundle
#       ../vllm-metal/bundle.toml) — plugin MLX, inny flow instalacji.
# =============================================================================

[bundle]
engine = "vllm"
description = "vLLM OpenAI-compatible LLM server (PyPI, pinned 0.19.1)"
python_version = "3.12"
# Pinned na 0.19.1 (kwiecien 2026 release, gRPC + Gemma 4). Switch z git HEAD
# na PyPI dla reproducibility — git main moze rozjechac sie z innymi deps.
source = "pypi"
pypi_package = "vllm==0.19.1"

[launch]
command = "python"
args = [
    "-m", "vllm.entrypoints.openai.api_server",
    "--host", "127.0.0.1",
    "--port", "${PORT:-8000}",
    "--model", "${MODEL}",
    "--dtype", "auto",
    "--gpu-memory-utilization", "${GPU_MEMORY_UTILIZATION:-0.9}",
    "--max-model-len", "${MAX_MODEL_LEN:-8192}",
]
internal_port = 8000

[requires]
gpu_memory_gb = 8
disk_gb = 20
platforms = ["linux-x86_64", "linux-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []
install_hint = "VLLM_TARGET_DEVICE=rocm"
