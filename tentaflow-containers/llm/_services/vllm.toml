# Manifest serwisu vLLM — serwer LLM z PagedAttention. Tylko native bundle
# (python), wieloplatformowo: CUDA (Linux/Windows), ROCm (Linux), MLX (macOS).

[engine]
id = "vllm"
category = "llm"
name = "vLLM"
description_pl = "Serwer LLM z PagedAttention i continuous batching. Wykrywa backend: CUDA / ROCm / MLX (Apple Silicon)."
description_en = "LLM server with PagedAttention and continuous batching. Auto-detects backend: CUDA / ROCm / MLX (Apple Silicon)."
homepage = "https://github.com/vllm-project/vllm"
license = "Apache-2.0"
icon = "vllm"
default_port = 8000
api = "openai-compatible"
version = "0.6.3"

[deploy.native]
platforms = ["linux", "windows", "macos"]
runtime = "python-bundle"
bundle_path = "llm/python/vllm"

[[model_preset]]
id = "qwen3-5-0-8b"
display_name = "Qwen 3.5 0.8B"
repo = "Qwen/Qwen3.5-0.8B"
recommended = true

[[model_preset]]
id = "llama-3-1-8b-instruct"
display_name = "Llama 3.1 8B Instruct"
repo = "meta-llama/Meta-Llama-3.1-8B-Instruct"
