# Manifest serwisu MLX — wbudowany engine LLM dla Apple Silicon (macOS/iOS).

[engine]
id = "mlx"
category = "llm"
name = "MLX"
description_pl = "Apple ML framework dla Apple Silicon. Najszybszy LLM na M1/M2/M3/M4."
description_en = "Apple's ML framework for Apple Silicon. Fastest on M1/M2/M3/M4."
homepage = "https://github.com/ml-explore/mlx"
license = "MIT"
icon = "mlx"
default_port = 8080
api = "openai-compatible"
version = "0.20.0"

[deploy.native]
platforms = ["macos", "ios"]
runtime = "embedded"
feature_flag = "inference-mlx"

[[model_preset]]
id = "qwen3-5-0-8b-mlx-4bit"
display_name = "Qwen 3.5 0.8B (MLX 4-bit)"
repo = "mlx-community/Qwen3.5-0.8B-MLX-4bit"
quantization = "int4"
recommended = true

# Bielik 4.5B Instruct + RAG fine-tune (vqstudio) — polski model, dobre
# wyniki dla rozmow PL i RAG context. 4-bit MLX — startowo dobry rozmiar
# dla iPhone 15 Pro / iPad Pro / Mac z >=16 GB unified memory.
[[model_preset]]
id = "bielik-4-5b-instruct-rag-mlx-4bit"
display_name = "Bielik 4.5B Instruct RAG (MLX 4-bit)"
repo = "vqstudio/Bielik-4.5B-v3.0-Instruct-RAG-0.8-MLX-4bit"
quantization = "int4"

# Bielik 4.5B Instruct (bez RAG fine-tune) — czysta rozmowa po polsku.
[[model_preset]]
id = "bielik-4-5b-instruct-mlx-4bit"
display_name = "Bielik 4.5B Instruct (MLX 4-bit)"
repo = "vqstudio/Bielik-4.5B-v3.0-Instruct-MLX-4bit"
quantization = "int4"

# Bielik 11B Instruct (speakleash) — wieksza wersja, lepsza jakosc
# rozmowy PL. Wymaga ~7-8 GB VRAM po 4-bit; M2 Pro / M3 / Mac Pro.
[[model_preset]]
id = "bielik-11b-instruct-mlx-4bit"
display_name = "Bielik 11B Instruct (MLX 4-bit)"
repo = "speakleash/Bielik-11B-v3.0-Instruct-MLX-4bit"
quantization = "int4"

# Qwen 3.5 9B — wieksza alternatywa Qwen, multijezykowa, ~6-7 GB VRAM 4-bit.
[[model_preset]]
id = "qwen3-5-9b-mlx-4bit"
display_name = "Qwen 3.5 9B (MLX 4-bit)"
repo = "mlx-community/Qwen3.5-9B-MLX-4bit"
quantization = "int4"
