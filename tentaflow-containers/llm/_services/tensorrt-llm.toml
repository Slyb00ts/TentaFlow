# Manifest serwisu TensorRT-LLM — silnik NVIDIA do produkcji LLM.

[engine]
id = "tensorrt-llm"
category = "llm"
name = "TensorRT-LLM"
description_pl = "Silnik LLM NVIDIA z optymalizacja TensorRT. Najszybsze inference na GPU NVIDIA."
description_en = "NVIDIA's LLM engine with TensorRT optimization. Fastest inference on NVIDIA GPUs."
homepage = "https://github.com/NVIDIA/TensorRT-LLM"
license = "Apache-2.0"
icon = "nvidia"
default_port = 8000
api = "openai-compatible"
version = "1.2.1"

[deploy.docker]
context_path = "llm/docker/tensorrt-llm"
platforms = ["linux", "windows"]
transport = "sidecar-quic"

[deploy.native]
runtime = "python-bundle"
bundle_path = "llm/python/tensorrt-llm"
platforms = ["linux"]

[[model_preset]]
id = "qwen2-5-0-5b-instruct"
display_name = "Qwen2.5 0.5B Instruct"
repo = "Qwen/Qwen2.5-0.5B-Instruct"
recommended = true

[[model_preset]]
id = "qwen3-5-0-8b"
display_name = "Qwen3.5 0.8B (wymaga trtllm 1.3+)"
repo = "Qwen/Qwen3.5-0.8B"

[[model_preset]]
id = "llama-3-1-8b-instruct"
display_name = "Llama 3.1 8B Instruct (gated)"
repo = "meta-llama/Meta-Llama-3.1-8B-Instruct"
