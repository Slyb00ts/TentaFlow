service_name = "llm-vllm"
model_aliases = []

[transport]
port = 5000
enable_lan_discovery = false
enable_dht_discovery = false

[role]
kind = "reverse_proxy"
upstream_url = "http://127.0.0.1:8000/v1"
api = "open_ai"
timeout_ms = 600000
