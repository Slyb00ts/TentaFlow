[engine]
id = "iroh-relay"
category = "tools"
name = "iroh Relay"
description_pl = "Self-hosted iroh relay and pkarr DNS stack for TentaFlow mesh."
description_en = "Self-hosted iroh relay and pkarr DNS stack for TentaFlow mesh."
homepage = "https://www.iroh.computer/"
