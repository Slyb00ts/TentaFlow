# Manifest serwisu sherpa-onnx — TTS przez ONNX Runtime, natywna binarka.

[engine]
id = "sherpa-onnx"
category = "tts"
name = "sherpa-onnx"
description_pl = "Silnik TTS przez ONNX Runtime, wsparcie wielu jezykow."
description_en = "TTS engine via ONNX Runtime, multilingual support."
homepage = "https://github.com/k2-fsa/sherpa-onnx"
license = "Apache-2.0"
icon = "sherpa"
default_port = 5020
api = "sherpa-tts"
version = "1.12.40"

[deploy.docker]
context_path = "tts/docker/sherpa-onnx"
platforms = ["linux", "windows"]

[deploy.native]
platforms = ["linux", "macos", "windows"]
# Embedded: sherpa-onnx C++ + onnxruntime wkompilowany do binarki tentaflow
# przez crate `sherpa-rs` (Rust bindings do sherpa-onnx). Cargo feature
# `inference-sherpa` musi byc wlaczone przy buildzie. Dziala na wszystkich
# platformach gdzie buduje sie tentaflow (Linux/macOS/Windows + iOS/Android).
runtime = "embedded"
feature_flag = "inference-sherpa"

[[model_preset]]
id = "vits-piper-en-amy-medium"
display_name = "VITS Piper en (Amy, medium)"
repo = "rhasspy/piper-voices/en/en_US/amy/medium"
recommended = true

[[model_preset]]
id = "vits-piper-pl_PL-jarvis_wg_glos-medium"
display_name = "VITS Piper pl_PL (Jarvis, medium)"
repo = "WitoldG/polish_piper_models"
recommended = true
