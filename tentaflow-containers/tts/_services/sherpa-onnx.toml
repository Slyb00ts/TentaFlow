# Manifest serwisu sherpa-onnx — TTS przez ONNX Runtime, natywna binarka.

[engine]
id = "sherpa-onnx"
category = "tts"
name = "sherpa-onnx"
description_pl = "Silnik TTS przez ONNX Runtime, wsparcie wielu jezykow."
description_en = "TTS engine via ONNX Runtime, multilingual support."
homepage = "https://github.com/k2-fsa/sherpa-onnx"
license = "Apache-2.0"
icon = "sherpa"
default_port = 5020
api = "sherpa-tts"
version = "1.12.40"

[deploy.docker]
context_path = "tts/docker/sherpa-onnx"
platforms = ["linux", "windows"]

[deploy.native]
platforms = ["linux", "macos", "windows"]
# Switch z runtime=binary (wymagal lokalnego cmake build trwajacego 10-30
# min) na python-bundle z PyPI 'sherpa-onnx==1.12.40'. Sherpa-onnx PyPI
# dostarcza prebuilt onnxruntime wheels dla Linux x86_64/aarch64,
# macOS aarch64 i Windows x86_64 — instalacja zero-config we wszystkich
# systemach. Server.py to FastAPI wrapper z /tts endpointem.
runtime = "python-bundle"
bundle_path = "tts/python/sherpa-onnx"

[[model_preset]]
id = "vits-piper-en-amy-medium"
display_name = "VITS Piper en (Amy, medium)"
repo = "rhasspy/piper-voices/en/en_US/amy/medium"
recommended = true

[[model_preset]]
id = "vits-piper-pl_PL-jarvis_wg_glos-medium"
display_name = "VITS Piper pl_PL (Jarvis, medium)"
repo = "WitoldG/polish_piper_models"
recommended = true
