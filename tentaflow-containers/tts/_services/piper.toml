# =============================================================================
# Plik: tts/_services/piper.toml
# Opis: Manifest silnika Piper TTS. Tryb deploymentu: native (binarka).
#       Lekki ONNX TTS dzialajacy nawet na Raspberry Pi. Status: planned.
# =============================================================================

[engine]
id = "piper"
category = "tts"
name = "Piper"
description_pl = "Piper TTS — neuronowy ONNX TTS, dziala na Raspberry Pi. Niskie zuzycie CPU."
description_en = "Piper TTS — neural ONNX TTS, runs on Raspberry Pi. Low CPU usage."
homepage = "https://github.com/rhasspy/piper"
docs_url = "https://github.com/rhasspy/piper/blob/master/README.md"
license = "MIT"
api = "custom"
default_port = 5020
version = "1.2.0"
tags = ["tts", "onnx", "lightweight", "edge", "raspberry-pi"]
icon = "piper"

# Wariant native Linux x64 CPU - planowany.
[[variant]]
id = "native-linux-x64-cpu"
deploy_mode = "native"
target_os = "linux"
target_arch = "x86_64"
gpu_backend = "cpu"
status = "planned"
ram_gb_min = 1
disk_gb_min = 1
notes_pl = "Planowane: native build Piper. Patrz tts/native/piper/README.md."
notes_en = "Planned: Piper native build. See tts/native/piper/README.md."

[variant.build]
context_path = "tts/native/piper"
tags = ["piper-cpu-linux-x86_64"]

[variant.build.build_args]
PIPER_VERSION = "1.2.0"

# Wariant native Windows x64 CPU - planowany.
[[variant]]
id = "native-windows-x64-cpu"
deploy_mode = "native"
target_os = "windows"
target_arch = "x86_64"
gpu_backend = "cpu"
status = "planned"
ram_gb_min = 1
disk_gb_min = 1
notes_pl = "Planowane: native build Piper dla Windows."
notes_en = "Planned: Piper native build for Windows."

[variant.build]
context_path = "tts/native/piper"
tags = ["piper-cpu-windows-x86_64"]

[variant.build.build_args]
PIPER_VERSION = "1.2.0"

# Wariant native macOS Apple Silicon - planowany.
[[variant]]
id = "native-macos-arm64-cpu"
deploy_mode = "native"
target_os = "macos"
target_arch = "aarch64"
gpu_backend = "cpu"
status = "planned"
ram_gb_min = 1
disk_gb_min = 1
notes_pl = "Planowane: native build Piper dla Apple Silicon (CoreML provider opcjonalnie)."
notes_en = "Planned: Piper native build for Apple Silicon (CoreML provider optional)."

[variant.build]
context_path = "tts/native/piper"
tags = ["piper-cpu-macos-arm64"]

[variant.build.build_args]
PIPER_VERSION = "1.2.0"
