# Manifest serwisu Kyutai Pocket TTS — UWAGA: maly model 100M params (~200 MB).
# Dziala na CPU bez GPU, 6x realtime na MacBook Air M4. Strumieniowy.
# 200 ms latencji do pierwszego chunka, English only (wiecej jezykow w planie).
# python-bundle dla wszystkich platform desktop + Docker dla Linux/Windows.

[engine]
id = "kyutai-tts"
category = "tts"
resource_kind = "ai"
name = "Kyutai Pocket TTS"
description_pl = "Maly TTS 100M parametrow (~200 MB). Streaming, CPU-only, ~6x realtime na M-series. EN."
description_en = "Tiny 100M-param TTS (~200 MB). Streaming, CPU-only, ~6x realtime on M-series. EN."
homepage = "https://kyutai.org/pocket-tts"
license = "CC-BY 4.0"
icon = "kyutai"
default_port = 8088
api = "openai-compatible"
version = "2.0.0"

[deploy.docker]
context_path = "tts/docker/kyutai-tts"
platforms = ["linux", "windows", "macos"]
transport = "sidecar-quic"

[deploy.native]
platforms = ["linux", "macos", "windows"]
runtime = "python-bundle"
bundle_path = "tts/python/kyutai-tts"

[[model_preset]]
id = "pocket-tts-en"
display_name = "Pocket TTS (EN, 100M, CPU)"
repo = "kyutai/pocket-tts-without-voice-cloning"
recommended = true
