[bundle]
engine = "xtts"
description = "Coqui-TTS XTTS v2 voice cloning (PyPI coqui-tts, pinned 0.27.4)"
# coqui-tts 0.27.4+ wspiera Python 3.11/3.12. Pakiet z PyPI (utrzymywany
# przez IDIAP po zamknieciu Coqui AI w grudniu 2025). NIE uzywamy git source
# bo idiap/coqui-ai-TTS HEAD ma ImportError (transformers usunelo
# isin_mps_friendly w >=4.57); PyPI wheel ma stabilne deps.
python_version = "3.11"
source = "pypi"
pypi_package = "coqui-tts==0.27.4"

[launch]
command = "uvicorn"
args = ["--app-dir", "${BUNDLE_DIR}", "server:app",
        "--host", "127.0.0.1", "--port", "${PORT:-8085}"]
internal_port = 8085

[requires]
gpu_memory_gb = 6
disk_gb = 8
platforms = ["linux-x86_64", "linux-aarch64", "macos-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
# Od coqui-tts 0.27.4 PyTorch nie jest pulled jako runtime dep — musimy
# zainstalowac go sami. transformers<4.50 zeby zachowac isin_mps_friendly
# (Coqui XTTS gpt.py zalezy od tego API).
extras = ["torch==2.4.0", "torchaudio==2.4.0"]
# Coqui-TTS 0.27.4 wymaga transformers >=4.50, co przy main install
# upgraduje transformers do 5.6.2 i Coqui XTTS gpt.py crashuje na
# `from transformers.pytorch_utils import isin_mps_friendly` (funkcja
# usunieta w >=4.57). Force-pin nadpisuje resolver po main install.
force_pins = [
    "transformers==4.49.0",
    "tokenizers==0.21.0",
    "huggingface-hub==0.26.5",
]

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = ["torch==2.4.0", "torchaudio==2.4.0"]
# Coqui-TTS 0.27.4 wymaga transformers >=4.50, co przy main install
# upgraduje transformers do 5.6.2 i Coqui XTTS gpt.py crashuje na
# `from transformers.pytorch_utils import isin_mps_friendly` (funkcja
# usunieta w >=4.57). Force-pin nadpisuje resolver po main install.
force_pins = [
    "transformers==4.49.0",
    "tokenizers==0.21.0",
    "huggingface-hub==0.26.5",
]

[[install_variants]]
backend = "metal"
extras = ["torch==2.4.0", "torchaudio==2.4.0"]
# Coqui-TTS 0.27.4 wymaga transformers >=4.50, co przy main install
# upgraduje transformers do 5.6.2 i Coqui XTTS gpt.py crashuje na
# `from transformers.pytorch_utils import isin_mps_friendly` (funkcja
# usunieta w >=4.57). Force-pin nadpisuje resolver po main install.
force_pins = [
    "transformers==4.49.0",
    "tokenizers==0.21.0",
    "huggingface-hub==0.26.5",
]
