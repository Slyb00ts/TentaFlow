[bundle]
engine = "xtts"
description = "XTTS v2 (coqui-TTS) voice cloning (git HEAD)"
# coqui-TTS nie wspiera jeszcze 3.12, wymaga 3.11 (3.13 zdecydowanie nie)
python_version = "3.11"
source = "git"
git_repo = "https://github.com/idiap/coqui-ai-TTS.git"
git_ref = "main"

[launch]
command = "uvicorn"
args = ["--app-dir", "${BUNDLE_DIR}", "server:app",
        "--host", "127.0.0.1", "--port", "${PORT:-8085}"]
internal_port = 8085

[requires]
gpu_memory_gb = 6
disk_gb = 8
platforms = ["linux-x86_64", "linux-aarch64", "macos-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
# coqui-ai-TTS na main nie deklaruje torch jako runtime dep (zalozenie ze
# user instaluje go z extra-index PyTorch). Wymuszamy torch + torchaudio
# zeby nasz server.py (`import torch`) sie nie wywalal.
extras = ["torch", "torchaudio"]

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = ["torch", "torchaudio"]

[[install_variants]]
backend = "metal"
extras = ["torch", "torchaudio"]
