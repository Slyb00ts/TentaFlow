[bundle]
engine = "voxcpm"
description = "VoxCPM2 TTS (git HEAD)"
python_version = "3.12"
source = "git"
git_repo = "https://github.com/OpenBMB/VoxCPM.git"
git_ref = "main"

[launch]
command = "uvicorn"
args = ["--app-dir", "${BUNDLE_DIR}", "server:app",
        "--host", "127.0.0.1", "--port", "${PORT:-8086}"]
internal_port = 8086

[requires]
gpu_memory_gb = 4
disk_gb = 6
platforms = ["linux-x86_64", "linux-aarch64", "macos-aarch64", "windows-x86_64"]

[[install_variants]]
backend = "cuda"
extra_index = "https://download.pytorch.org/whl/cu124"
extras = []

[[install_variants]]
backend = "rocm"
extra_index = "https://download.pytorch.org/whl/rocm7.0"
extras = []

[[install_variants]]
backend = "metal"
extras = []
