# Manifest agenta teams-bot — bot Microsoft Teams (transkrypcja + TTS).

[engine]
id = "teams-bot"
category = "agents"
name = "Teams Bot"
description_pl = "Bot Microsoft Teams - laczy sie z meeting, transkrybuje, odpowiada przez TTS."
description_en = "Microsoft Teams bot - joins meetings, transcribes, responds via TTS."
homepage = "https://learn.microsoft.com/en-us/microsoftteams/platform/bots/what-are-bots"
license = "MIT"
default_port = 5000
api = "custom"
version = "0.1.0"

[deploy.docker]
context_path = "agents/docker/teams-bot"
platforms = ["linux"]

# Native bundle — binarka `tentaflow-meeting` budowana razem z `tentaflow`
# (patrz tentaflow/build.rs). Deploy.native runtime=binary rejestruje serwis
# w DB; sam proces bota startuje per-spotkanie z `MeetingManager::start_session`.
[deploy.native]
platforms = ["linux", "macos", "windows"]
runtime = "binary"
binary_path = "agents/native/teams-bot"
