# =============================================================================
# Plik: pulseaudio.conf
# Opis: Minimalna konfiguracja PulseAudio dla kontenera meeting-bot.
#       Audio NIE jest rutowane przez PulseAudio — przechwytywanie i mic
#       injection dzieje sie w Chromium przez wstrzykniety JS (browser_inject.js)
#       + WebSocket bridge (audio.rs). PulseAudio istnieje po to, zeby Chromium
#       widzial dostepne urzadzenia (inaczej enumerateDevices zwraca []) i Teams
#       pozwolil dolaczyc do spotkania.
# =============================================================================

load-module module-native-protocol-unix
load-module module-always-sink

# Sink domyslny — Chromium tu pisze audio ktore jest odrzucane (null).
# Prawdziwe capture dzieje sie przez element.captureStream() w browser_inject.js,
# ZANIM audio trafi do tego sinka.
load-module module-null-sink sink_name=default_sink sink_properties=device.description="Default-Speaker"

# Source domyslny — bez tego Chromium nie widzi mikrofonu i Teams nie pozwala
# dolaczyc. Monitor null-sinka eksponowany jako "mikrofon" — dostarcza cisze.
# Prawdziwy audio bota jest wstrzykiwany przez MediaStreamTrackGenerator w JS,
# ktory omija ten fake source calkowicie.
load-module module-remap-source master=default_sink.monitor source_name=default_mic source_properties=device.description="Default-Microphone"

set-default-sink default_sink
set-default-source default_mic
