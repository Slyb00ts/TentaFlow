# =============================================================================
# Plik: embeddings/_services/onnx-embeddings.toml
# Opis: Manifest silnika natywnych embeddings przez ONNX Runtime. Tryb
#       deploymentu: native. Status: planned. Lekkie, bez Pythona.
# =============================================================================

[engine]
id = "onnx-embeddings"
category = "embeddings"
name = "ONNX Embeddings"
description_pl = "Natywne embeddings przez ONNX Runtime. Lekkie, bez Pythona, dziala na Raspberry Pi."
description_en = "Native embeddings via ONNX Runtime. Lightweight, no Python, runs on Raspberry Pi."
homepage = "https://github.com/Anush008/fastembed-rs"
license = "Apache-2.0"
api = "custom"
default_port = 5050
version = "0.4.0"
tags = ["embeddings", "onnx", "edge", "lightweight", "no-python"]
icon = "onnx-embeddings"

# Wariant native Linux x64 CPU - planowany.
[[variant]]
id = "native-linux-x64-cpu"
deploy_mode = "native"
target_os = "linux"
target_arch = "x86_64"
gpu_backend = "cpu"
status = "planned"
ram_gb_min = 2
disk_gb_min = 1
notes_pl = "Planowane: integracja fastembed-rs lub bezposrednio ort. Patrz embeddings/native/text-embeddings/."
notes_en = "Planned: fastembed-rs or direct ort integration. See embeddings/native/text-embeddings/."

[variant.build]
context_path = "embeddings/native/text-embeddings"
tags = ["onnx-embeddings-cpu-linux-x86_64"]

[variant.build.build_args]
FASTEMBED_VERSION = "0.4.0"
