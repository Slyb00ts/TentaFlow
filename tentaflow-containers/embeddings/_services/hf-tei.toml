# =============================================================================
# Plik: embeddings/_services/hf-tei.toml
# Opis: Manifest silnika HuggingFace Text Embeddings Inference. Tryb deploymentu:
#       docker (Linux x64 CUDA + CPU). Produkcyjny serwer embeddingow.
# =============================================================================

[engine]
id = "hf-tei"
category = "embeddings"
name = "HuggingFace TEI"
description_pl = "HuggingFace TEI — produkcyjny serwer embeddingow. Wsparcie BERT, RoBERTa, BGE, GTE."
description_en = "HuggingFace TEI — production embeddings server. Supports BERT, RoBERTa, BGE, GTE."
homepage = "https://github.com/huggingface/text-embeddings-inference"
docs_url = "https://huggingface.github.io/text-embeddings-inference/"
license = "Apache-2.0"
api = "openai-compatible"
default_port = 5050
version = "1.5.0"
tags = ["embeddings", "huggingface", "production", "bge", "gte"]
icon = "hf-tei"

# Wariant Linux x64 CUDA - GPU dla wysokiej przepustowosci.
[[variant]]
id = "linux-x64-cuda"
deploy_mode = "docker"
target_os = "linux"
target_arch = "x86_64"
gpu_backend = "cuda"
status = "stable"
vram_gb_min = 2
ram_gb_min = 8
disk_gb_min = 5
notes_pl = "Wymaga nvidia-container-toolkit. Wysoka przepustowosc dla batch embeddings."
notes_en = "Requires nvidia-container-toolkit. High throughput for batch embeddings."

[variant.build]
context_path = "embeddings/docker/hf-tei"
dockerfile = "Dockerfile"
tags = ["tentaflow/hf-tei:cuda-x86_64"]

[variant.build.build_args]
TEI_VERSION = "1.5.0"

# Wariant Linux x64 CPU - dla mniejszych obciazen lub maszyn bez GPU.
[[variant]]
id = "linux-x64-cpu"
deploy_mode = "docker"
target_os = "linux"
target_arch = "x86_64"
gpu_backend = "cpu"
status = "stable"
ram_gb_min = 4
disk_gb_min = 5
notes_pl = "Wariant CPU - dla maszyn bez GPU lub gdy embedding nie jest waskim gardlem."
notes_en = "CPU variant - for machines without GPU or when embedding isn't the bottleneck."

[variant.build]
context_path = "embeddings/docker/hf-tei"
dockerfile = "Dockerfile"
tags = ["tentaflow/hf-tei:cpu-x86_64"]

[variant.build.build_args]
TEI_VERSION = "1.5.0"
TEI_RUNTIME = "cpu"

# Rekomendowane modele embeddings.

[[model_preset]]
id = "bge-m3"
display_name = "BGE-M3 (multilingual)"
repo = "BAAI/bge-m3"
quantization = "fp16"
vram_gb_min = 2
recommended = true

[[model_preset]]
id = "bge-large-en-v1-5"
display_name = "BGE Large EN v1.5"
repo = "BAAI/bge-large-en-v1.5"
quantization = "fp16"
vram_gb_min = 2

[[model_preset]]
id = "gte-multilingual"
display_name = "GTE Multilingual Base"
repo = "Alibaba-NLP/gte-multilingual-base"
quantization = "fp16"
vram_gb_min = 1
