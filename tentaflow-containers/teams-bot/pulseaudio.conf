# =============================================================================
# Plik: pulseaudio.conf
# Opis: Konfiguracja PulseAudio dla meeting sidecar.
#
# Flow:
#   Uczestnicy -> Chromium speaker -> meeting_output (null-sink)
#   meeting_output.monitor -> sidecar capture -> VAD -> STT
#   Sidecar TTS -> tts_playback (null-sink) -> virtual_mic (remap-source)
#   virtual_mic -> Chromium mic -> uczestnicy slysza bota
# =============================================================================

# Protokol Unix
load-module module-native-protocol-unix

# Nigdy nie suspenduj sinkow — musza byc zawsze aktywne
load-module module-suspend-on-idle timeout=86400

# Bazowy null-sink (potrzebny jako master dla virtual-sink)
load-module module-null-sink sink_name=null_out sink_properties=device.description="Null-Output"

# Sink: Chromium speaker — virtual-sink ma dzialajacy monitor (null-sink nie ma!)
load-module module-virtual-sink sink_name=meeting_output master=null_out sink_properties=device.description="Meeting-Speaker"

# Sink: TTS playback
load-module module-null-sink sink_name=tts_playback sink_properties=device.description="TTS-Playback"

# Source: mikrofon bota (monitor tts_playback -> Chromium mic)
load-module module-remap-source master=tts_playback.monitor source_name=virtual_mic source_properties=device.description="Bot-Microphone"

# Defaults
set-default-sink meeting_output
set-default-source virtual_mic
