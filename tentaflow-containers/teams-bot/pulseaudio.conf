load-module module-native-protocol-unix
load-module module-suspend-on-idle timeout=86400
load-module module-always-sink

# Capture: virtual-sink (monitor DZIALA w odroznieniu od null-sink w Dockerze)
# Podejscie z Jibri (jitsi/jibri) — jedyne dzialajace w Docker + PulseAudio 16
load-module module-null-sink sink_name=null_out sink_properties=device.description="null"
load-module module-virtual-sink sink_name=speaker master=null_out sink_properties=device.description="Speaker"

# TTS: virtual-sink dla odtwarzania bot audio
load-module module-null-sink sink_name=tts_null sink_properties=device.description="tts_null"
load-module module-virtual-sink sink_name=tts master=tts_null sink_properties=device.description="TTS"

# Bot mikrofon — Chromium widzi to jako mikrofon
load-module module-remap-source master=tts.monitor source_name=bot_mic source_properties=device.description="Bot-Microphone"

# Loopback utrzymuje speaker.monitor aktywny — bez tego PulseAudio 16 w Docker
# nie przekazuje danych klientow do monitora. Loopback wraca do speaker
# z niskim volume (3%) — wystarczajaco zeby monitor dzialal,
# za malo zeby feedback loop narastal powyzej szumu
load-module module-loopback source=speaker.monitor sink=speaker latency_msec=1 source_dont_move=true sink_dont_move=true adjust_time=0

set-default-sink speaker
set-default-source bot_mic
