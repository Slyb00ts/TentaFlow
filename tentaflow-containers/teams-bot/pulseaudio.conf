# =============================================================================
# Plik: pulseaudio.conf
# Opis: Konfiguracja PulseAudio dla meeting sidecar — wirtualne urzadzenia
#       audio do przechwytywania dzwieku ze spotkania i odtwarzania TTS.
#
# Flow:
#   Uczestnicy spotkania -> Chromium speaker -> meeting_output (sink)
#   meeting_output.monitor -> sidecar capture -> VAD -> STT
#   Sidecar TTS -> tts_playback (sink) -> tts_playback.monitor -> virtual_mic
#   virtual_mic -> Chromium microphone -> uczestnicy slysza bota
# =============================================================================

# NIE ladujemy default.pa — chcemy TYLKO nasze wirtualne urzadzenia
# .include /etc/pulse/default.pa.d/

# Protokol Unix — PulseAudio socket
load-module module-native-protocol-unix

# ---------------------------------------------------------------------------
# Sink: Chromium speaker — dzwiek od uczestnikow spotkania trafia tutaj
# Sidecar przechwytuje z meeting_output.monitor
# ---------------------------------------------------------------------------
load-module module-null-sink sink_name=meeting_output sink_properties=device.description="Meeting-Speaker"

# ---------------------------------------------------------------------------
# Sink: TTS playback — sidecar pisze tu syntezowana mowe
# Monitor tego sinku jest mikrofonem Chromium
# ---------------------------------------------------------------------------
load-module module-null-sink sink_name=tts_playback sink_properties=device.description="TTS-Playback"

# ---------------------------------------------------------------------------
# Source: wirtualny mikrofon — Chromium uzywa go jako wejscie mikrofonu
# Inne osoby w spotkaniu slysza to co sidecar wypisze na tts_playback
# ---------------------------------------------------------------------------
load-module module-remap-source master=tts_playback.monitor source_name=virtual_mic source_properties=device.description="Bot-Microphone"

# ---------------------------------------------------------------------------
# Domyslne urzadzenia — Chromium uzywa tych jako "Default"
# ---------------------------------------------------------------------------
# Speaker: audio od uczestnikow -> meeting_output -> sidecar przechwytuje
set-default-sink meeting_output
# Mikrofon: virtual_mic -> to co sidecar generuje (TTS) -> uczestnicy slysza
set-default-source virtual_mic
