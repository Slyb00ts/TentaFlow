# =============================================================================
# Plik: pulseaudio.conf
# Opis: Konfiguracja PulseAudio dla meeting sidecar — wirtualne urzadzenia
#       audio do przechwytywania dzwieku ze spotkania i odtwarzania TTS.
# =============================================================================

# Ladowanie podstawowych modulow
.include /etc/pulse/default.pa.d/

load-module module-native-protocol-unix

# ---------------------------------------------------------------------------
# Sink: wyjscie audio Chromium (dzwiek ze spotkania trafia tutaj)
# ---------------------------------------------------------------------------
load-module module-null-sink sink_name=meeting_output sink_properties=device.description="Meeting-Output"

# ---------------------------------------------------------------------------
# Zrodlo: monitor sinku — sidecar przechwytuje dzwiek stad
# Chromium odtwarza audio -> meeting_output -> meeting_output.monitor -> sidecar
# ---------------------------------------------------------------------------
# (monitor jest tworzony automatycznie przez module-null-sink)

# ---------------------------------------------------------------------------
# Sink: odtwarzanie TTS — sidecar zapisuje tu syntezowana mowe
# ---------------------------------------------------------------------------
load-module module-null-sink sink_name=tts_playback sink_properties=device.description="TTS-Playback"

# ---------------------------------------------------------------------------
# Zrodlo wirtualne: monitor tts_playback jako mikrofon dla Chromium
# Sidecar -> tts_playback -> tts_playback.monitor -> Chromium (mikrofon)
# ---------------------------------------------------------------------------
load-module module-remap-source master=tts_playback.monitor source_name=virtual_mic source_properties=device.description="Virtual-Microphone"

# Domyslne urzadzenia
# default-sink: Chromium wysyla audio ze spotkania tutaj
set-default-sink meeting_output
# default-source: sidecar przechwytuje audio ze spotkania stad
# (monitor sinku meeting_output — audio od wszystkich uczestnikow)
set-default-source meeting_output.monitor
