# =============================================================================
# Plik: reranker/_services/bge-reranker.toml
# Opis: Manifest silnika BGE Reranker (cross-encoder). Tryb deploymentu: docker
#       (Linux x64 CUDA). Sluzy do precyzyjnego scoringu dokumentow w RAG.
# =============================================================================

[engine]
id = "bge-reranker"
category = "reranker"
name = "BGE Reranker"
description_pl = "BGE Reranker — cross-encoder do precyzyjnego scoringu dokumentow dla RAG."
description_en = "BGE Reranker — cross-encoder for precise document scoring in RAG."
homepage = "https://huggingface.co/BAAI/bge-reranker-v2-m3"
docs_url = "https://github.com/FlagOpen/FlagEmbedding"
license = "MIT"
api = "openai-compatible"
default_port = 5055
version = "1.5.0"
tags = ["reranker", "rag", "cross-encoder", "bge"]
icon = "bge-reranker"

# Wariant Linux x64 CUDA - jedyny wspierany.
[[variant]]
id = "linux-x64-cuda"
deploy_mode = "docker"
target_os = "linux"
target_arch = "x86_64"
gpu_backend = "cuda"
status = "stable"
vram_gb_min = 2
ram_gb_min = 4
disk_gb_min = 5
notes_pl = "Wymaga nvidia-container-toolkit. Cross-encoder znacznie wolniejszy od bi-encoder, uzyj na top-K dokumentow."
notes_en = "Requires nvidia-container-toolkit. Cross-encoder significantly slower than bi-encoder, use on top-K docs."

[variant.build]
context_path = "reranker/docker/bge-reranker"
dockerfile = "Dockerfile"
tags = ["tentaflow/bge-reranker:cuda-x86_64"]

[variant.build.build_args]
RERANKER_VERSION = "1.5.0"

# Rekomendowane modele.

[[model_preset]]
id = "bge-reranker-v2-m3"
display_name = "BGE Reranker v2 M3 (multilingual)"
repo = "BAAI/bge-reranker-v2-m3"
quantization = "fp16"
vram_gb_min = 2
recommended = true

[[model_preset]]
id = "bge-reranker-large"
display_name = "BGE Reranker Large"
repo = "BAAI/bge-reranker-large"
quantization = "fp16"
vram_gb_min = 2
