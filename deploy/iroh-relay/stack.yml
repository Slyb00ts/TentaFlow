# =============================================================================
# Plik: stack.yml
# Opis: Portainer stack z wlasnym iroh-relay + iroh-dns-server dla TentaFlow.
#       Pozwala parowac nody w srodowiskach gdzie publiczna infra n0
#       (use1-1.relay.n0.iroh-canary.iroh.link, dns.iroh.link) jest zablokowana
#       — np. runai/k8s workspace z ograniczonym egress DNS.
#
# Wymagania na hoscie:
#   - Publiczne IPv4, porty otwarte w firewallu:
#       443/tcp   HTTPS (relay + pkarr DNS over HTTPS)
#       3478/udp  STUN
#       7842/udp  iroh QUIC relay
#       80/tcp    HTTP (ACME HTTP-01 challenge dla Let's Encrypt) - tylko na czas certu
#   - Domena (np. "relay.example.com") z rekordem A -> IP hosta.
#   - Docker + Portainer (host z dostepem do internetu wychodzacego na ACME).
#
# Deployment:
#   1. Zbuduj obrazy (patrz Dockerfile.relay / Dockerfile.dns w tym katalogu)
#      i wypchnij do rejestru (np. ghcr.io/<ty>/iroh-relay:0.98) albo podepnij
#      lokalnie. Alternatywnie mozesz wskazac Portainerowi budowanie
#      bezposrednio z tego katalogu (build: .).
#   2. W Portainer > Stacks > Add stack wklej zawartosc stack.yml.
#   3. W sekcji Environment variables uzupelnij IROH_RELAY_HOSTNAME i
#      IROH_ACME_EMAIL.
#   4. Deploy. Wolumin 'iroh-relay-data' przechowuje wystawione certy.
#   5. Po starcie sprawdz `docker logs iroh-relay` — powinny przyjsc "relay
#      started" i "obtained certificate". Potem z kazdego TentaFlow noda:
#        curl -v https://relay.example.com/
#      powinno zwrocic 200.
#   6. W kazdym TentaFlow noda config.toml:
#        [mesh]
#        iroh_relay_url     = "https://relay.example.com/"
#        iroh_pkarr_dns_url = "https://relay.example.com/pkarr"
#      (drugie pole wymaga nowego commita TentaFlow — patrz TODO na koncu).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # iroh-relay — QUIC/STUN relay server dla nodow za NATem. Kazdy TentaFlow
  # node utrzymuje tu sesje HTTPS + QUIC i przez to przechodza strumienie mesh.
  # ---------------------------------------------------------------------------
  iroh-relay:
    image: ghcr.io/slyb00ts/iroh-relay:0.98.0
    container_name: iroh-relay
    restart: unless-stopped
    network_mode: host   # raw UDP STUN + QUIC nie dziala za docker NAT-em
    volumes:
      - iroh-relay-data:/data
      - ./relay.toml:/data/relay.toml:ro
    environment:
      RUST_LOG: "iroh_relay=info,warn"
    command:
      - "--config-path"
      - "/data/relay.toml"

  # ---------------------------------------------------------------------------
  # iroh-dns-server — serwer pkarr/DNS który trzyma address-lookup records
  # dla node_id-ów publikujacych sie przez ten relay. Bez niego initiator z
  # innej sieci nie znajdzie peera po samym node_id.
  # ---------------------------------------------------------------------------
  iroh-dns:
    image: ghcr.io/slyb00ts/iroh-dns-server:0.98.0
    container_name: iroh-dns
    restart: unless-stopped
    # Tu NIE robimy network_mode=host bo DNS nie potrzebuje raw UDP z hosta —
    # idzie przez HTTPS od strony klientow iroh (endpoint /pkarr). Mapujemy
    # tylko wewnetrzny port 8080 na localhost; iroh-relay go proxuje pod
    # /pkarr na 443.
    network_mode: bridge
    expose:
      - "8080"
    volumes:
      - iroh-dns-data:/data
      - ./dns.toml:/data/dns.toml:ro
    environment:
      RUST_LOG: "iroh_dns_server=info,warn"
    command:
      - "--config"
      - "/data/dns.toml"

volumes:
  iroh-relay-data:
    name: iroh-relay-data
  iroh-dns-data:
    name: iroh-dns-data
