# ============================================================================
# File: tests/e2e/config-soak.toml — config for M3.W14 24h soak run
# ============================================================================
#
# Purpose: long-running tentaflow instance with monitoring enabled, isolated
# DB/ports so it does not collide with dev or other e2e runs.
#
# Used by: scripts/soak/run_soak.sh
# Acceptance targets: see scripts/soak/analyze.py and docs/SOAK_TEST.md.

services = []
service_aliases = []
node_role = "router"

[server]
max_total_connections = 200
max_concurrent_requests = 20
max_queued_requests = 50
worker_threads = 4
cpu_affinity = false
log_level = "info"
log_format = "json"

[protocols.openai_api]
enabled = true
bind = "0.0.0.0:18099"
max_connections = 100
request_timeout_ms = 30000
body_limit_bytes = 1048576

[protocols.quic]
enabled = true
bind = "0.0.0.0:18099"
max_connections = 20
max_streams_per_connection = 20
idle_timeout_ms = 30000

[middleware]
request_validation_enabled = false
response_filtering_enabled = false
rate_limiting_enabled = false
audit_logging_enabled = false

[rate_limiting]
default_requests_per_second = 200
default_burst = 400

[load_balancing]
health_check_interval_ms = 5000
health_check_timeout_ms = 2000
unhealthy_threshold = 3
healthy_threshold = 2
queue_timeout_ms = 30000
circuit_breaker_enabled = false
circuit_breaker_threshold = 5
circuit_breaker_timeout_ms = 60000

# Prometheus is REQUIRED for soak metric scraping (DB pool stats).
[monitoring]
prometheus_enabled = true
prometheus_bind = "0.0.0.0:19099"
health_check_enabled = true
health_check_bind = "0.0.0.0:19889"
health_check_path = "/health"
tracing_enabled = false

[mesh]
enabled = false
port = 18099
static_peers = []
mdns_enabled = false
heartbeat_interval_ms = 1000
peer_timeout_ms = 5000
cluster_name = "tentaflow-soak"

[storage]
db_path = "/tmp/tentaflow-soak.db"

[auth]
admin_username = "admin"
admin_password = "soak-test-2026"
