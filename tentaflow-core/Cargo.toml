[package]
name = "tentaflow-core"
version = "0.1.0"
edition = "2021"
description = "TentaFlow Core — wspolna biblioteka dla Router, Desktop i Mobile"

[features]
default = []
docker = ["dep:bollard"]
inference-llamacpp = ["dep:llama-cpp-2", "dep:encoding_rs"]
inference-mlx = ["dep:mlx-rs", "dep:mlx-models", "dep:tokenizers"]
inference-diarization = ["dep:tentaflow-voice"]
dashboard-api = ["dep:axum", "dep:tower", "dep:tower-http"]
inference-mlx-swift = []  # bridge do Swift MLX na iOS — implementacja w Fazie 3
metrics-prometheus = ["dep:prometheus"]
rdma-probe = []
gpu-cuda = ["inference-llamacpp", "llama-cpp-2/cuda", "whisper-rs/cuda"]
gpu-vulkan = ["inference-llamacpp", "llama-cpp-2/vulkan", "whisper-rs/vulkan"]
gpu-rocm = ["inference-llamacpp", "llama-cpp-2/rocm", "whisper-rs/hipblas"]

[dependencies]
# Protocol (zawsze)
tentaflow-protocol = { path = "../tentaflow-protocol" }

# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Networking — QUIC
quinn = "0.11"
rustls = { version = "0.23", features = ["ring"] }
tokio-rustls = "0.26"
rustls-pemfile = "2.0"
webpki-roots = "1.0.4"
tokio-util = "0.7"

# HTTP
reqwest = { version = "0.11", features = ["json", "stream", "rustls-tls", "multipart", "blocking"] }
hyper = { version = "1.1", features = ["full"] }
hyper-util = { version = "0.1", features = ["tokio", "server-auto", "http1", "http2"] }
http-body-util = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9"
rkyv = { version = "0.8.12", features = ["unaligned"] }

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# Crypto
argon2 = "0.5"
sha2 = "0.10"
aes-gcm = "0.10"
hkdf = "0.12"
zeroize = "1.7"
jsonwebtoken = "9.3"
ed25519-dalek = { version = "2", features = ["rand_core"] }
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
curve25519-dalek = "4"

# WebSocket
tokio-tungstenite = "0.24"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Embedowanie kontekstu kontenerow w binarce (deploy::bundle)
flate2 = "1"
tar = "0.4"
tempfile = "3"
# Parsowanie compose_yaml z wizarda przy deploy bundled containers
serde_yaml = "0.9"

# Synchronizacja
parking_lot = "0.12"
dashmap = "6"

# Utils
uuid = { version = "1.0", features = ["v4"] }
lazy_static = "1.4"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
base64 = "0.22"
hex = "0.4"
regex = "1"

# Multipart form data parsing
multer = "3.1"

# Dashboard API (optional)
axum = { version = "0.8", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["cors", "fs"], optional = true }

# Docker (optional)
bollard = { version = "0.18", optional = true }

# Inference — llama.cpp (optional)
llama-cpp-2 = { version = "0.1", features = ["sampler"], optional = true }
encoding_rs = { version = "0.8", optional = true }

# Inference — MLX (optional, macOS only)
mlx-rs = { version = "0.25", features = ["metal", "accelerate"], optional = true }
mlx-models = { path = "../mlx-models", optional = true }
tokenizers = { version = "0.21", optional = true }

# STT — Whisper (optional)
whisper-rs = "0.16"
hound = "3.5"
symphonia = { version = "0.5", default-features = false, features = ["mp3", "ogg", "vorbis", "pcm"] }

# Speaker diarization — pure Rust forward pass przez tentaflow-voice
# Cross-platform (Linux/macOS/Windows/iOS/Android), bez ort/onnxruntime ABI hell
tentaflow-voice = { path = "../tentaflow-voice", optional = true }

# Embedded static files — generowane przez build.rs (bez include_dir!)
# MIME detection jest w build.rs

# Mesh
mdns-sd = "0.12"
hostname = "0.4"
sysinfo = "0.33"
num_cpus = "1"
which = "6"
rcgen = "0.13"

# GPU detection — cross-platform (Metal, Vulkan, DX12, GL)
wgpu = "24"

# Pobieranie modeli z HuggingFace
hf-hub = "0.4"

# Hub — wyszukiwanie i magazyn modeli
urlencoding = "2"
url = "2"
dirs = "5"

# Metrics (optional)
prometheus = { version = "0.13", optional = true }

# WASM runtime — wasmtime na Desktop/Router, wasmi na Mobile (iOS/Android)
# Target-specific dependencies ponizej

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"


[target.'cfg(not(any(target_os = "ios", target_os = "android")))'.dependencies]
wasmtime = "29"
wasmtime-wasi = "29"

[target.'cfg(any(target_os = "ios", target_os = "android"))'.dependencies]
wasmi = "0.44"

[build-dependencies]
rcgen = "0.13"

[dev-dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
wasmtime = "29"
tempfile = "3"
