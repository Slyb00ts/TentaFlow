[addon]
id = "memory"
name = "TentaFlow Memory"
version = "0.1.0"
description = "Persistent AI memory with knowledge graph, vector search, conversation history and REM consolidation."
category = "ai"
keywords = ["memory", "remember", "recall", "forget", "knowledge", "graph", "facts", "summary", "context", "history", "conversation"]
author = "TentaFlow"
license = "Apache-2.0"
homepage = ""
icon = "rag-db"
runtime = "wasmtime"
platforms = ["linux", "macos", "windows", "ios", "android"]
wasm_file = "addon.wasm"

[[addon.disambiguation]]
trigger = ["remember", "store this", "save this", "note this"]
prefer = "memory.memory_store"
over = "memory.memory_recall"
when = "user wants to store new information"

[[addon.disambiguation]]
trigger = ["what do you know", "do you remember", "recall"]
prefer = "memory.memory_recall"
over = "memory.memory_search"
when = "user asks about previously stored information"

[[permission]]
id = "storage.read"
display_name = "Read addon storage"
description = "Read key-value entries scoped to this addon."
risk = "low"

[[permission]]
id = "storage.write"
display_name = "Write addon storage"
description = "Write key-value entries scoped to this addon."
risk = "medium"

[[permission]]
id = "storage.delete"
display_name = "Delete addon storage"
description = "Remove key-value entries scoped to this addon."
risk = "medium"

[[permission]]
id = "events.publish"
display_name = "Publish events"
description = "Emit memory lifecycle events (stored/recalled/forgotten)."
risk = "low"

[[permission]]
id = "events.subscribe"
display_name = "Subscribe to events"
description = "Listen to chat events to auto-extract facts."
risk = "low"

[[permission]]
id = "llm.generate"
display_name = "Generate with LLM"
description = "Summarize conversations and extract facts using an LLM."
risk = "medium"

[[permission]]
id = "memory.read"
display_name = "Read memories"
description = "Read and search stored memories."
risk = "low"

[[permission]]
id = "memory.write"
display_name = "Write memories"
description = "Store new facts and memories."
risk = "medium"

[[permission]]
id = "memory.delete"
display_name = "Delete memories"
description = "Forget or remove stored memories."
risk = "medium"

[[permission]]
id = "memory.admin"
display_name = "Manage global memory"
description = "Modify the global and project memory layers shared across users."
risk = "high"

[visibility]
admin_only = false
default_groups = []
show_in_catalog = true

[resources]
memory_mb = 512
storage_mb = 1024
llm_tokens_per_min = 200000

[lifecycle]
background = true
auto_start = true

[config.schema]
rem_interval_minutes = { type = "number", label = "REM consolidation interval (minutes)", default = 60 }
max_context_tokens = { type = "number", label = "Max memory tokens in LLM context", default = 1024 }
recent_messages_count = { type = "number", label = "Recent messages kept in full context", default = 4 }
auto_extract_facts = { type = "boolean", label = "Automatically extract facts from messages", default = true }
auto_summarize_interval = { type = "number", label = "Auto-summarize every N messages", default = 10 }
decay_threshold_days = { type = "number", label = "Days without access before memory decay", default = 30 }

[[tool]]
id = "memory_store"
display_name = "Store a memory"
description = "Store a fact, preference or piece of information in memory."
keywords = ["remember", "store", "save", "note", "memorize", "keep"]

[[tool.parameter]]
name = "fact"
param_type = "string"
description = "The information to store."
required = true

[[tool.parameter]]
name = "layer"
param_type = "string"
description = "Memory layer: global, project, user, conversation (default: auto-detect)."
required = false

[[tool.parameter]]
name = "tags"
param_type = "string"
description = "Comma-separated tags for categorization."
required = false

[[tool]]
id = "memory_recall"
display_name = "Recall memories"
description = "Recall relevant memories for a given context or query."
keywords = ["remember", "recall", "know", "remind", "context", "history"]

[[tool.parameter]]
name = "query"
param_type = "string"
description = "What to search for."
required = true

[[tool.parameter]]
name = "layers"
param_type = "string"
description = "Which layers to search: global,project,user,conversation (default: all)."
required = false

[[tool.parameter]]
name = "limit"
param_type = "number"
description = "Maximum results (default: 10)."
required = false

[[tool]]
id = "memory_search"
display_name = "Search memories"
description = "Search memories by semantic similarity."
keywords = ["search", "find", "look up", "related", "similar"]

[[tool.parameter]]
name = "query"
param_type = "string"
description = "Search query."
required = true

[[tool.parameter]]
name = "layers"
param_type = "string"
description = "Which layers to search (default: all)."
required = false

[[tool.parameter]]
name = "type"
param_type = "string"
description = "Filter by type: fact, decision, correction, preference (default: all)."
required = false

[[tool.parameter]]
name = "limit"
param_type = "number"
description = "Maximum results (default: 10)."
required = false

[[tool]]
id = "memory_forget"
display_name = "Forget a memory"
description = "Remove a specific memory."
keywords = ["forget", "remove", "delete", "erase", "clear"]

[[tool.parameter]]
name = "query"
param_type = "string"
description = "What to forget (semantic search)."
required = false

[[tool.parameter]]
name = "node_id"
param_type = "number"
description = "Specific node ID to remove."
required = false

[[tool]]
id = "memory_correct"
display_name = "Correct a memory"
description = "Correct a wrong memory with the right information."
keywords = ["correct", "fix", "wrong", "update", "change", "actually"]

[[tool.parameter]]
name = "wrong"
param_type = "string"
description = "The incorrect fact."
required = true

[[tool.parameter]]
name = "correct"
param_type = "string"
description = "The correct fact."
required = true

[[tool.parameter]]
name = "source"
param_type = "string"
description = "Source: user_correction, fact_update (default: user_correction)."
required = false

[[tool]]
id = "memory_summarize"
display_name = "Summarize a conversation"
description = "Generate or retrieve a summary of a conversation or topic."
keywords = ["summarize", "summary", "overview", "recap", "tldr"]

[[tool.parameter]]
name = "conversation_id"
param_type = "string"
description = "Conversation to summarize (default: current)."
required = false

[[tool.parameter]]
name = "topic"
param_type = "string"
description = "Summarize by topic across conversations."
required = false

[[tool]]
id = "memory_graph_query"
display_name = "Query the knowledge graph"
description = "Query the knowledge graph for related facts and connections."
keywords = ["related", "connected", "graph", "relations", "linked", "chain"]

[[tool.parameter]]
name = "node"
param_type = "string"
description = "Starting concept to explore."
required = true

[[tool.parameter]]
name = "depth"
param_type = "number"
description = "How many hops to traverse (default: 2, max: 3)."
required = false

[[tool.parameter]]
name = "relations"
param_type = "string"
description = "Filter by relation types (comma-separated)."
required = false

[[tool]]
id = "memory_status"
display_name = "Memory status"
description = "Show memory statistics and health."
keywords = ["memory", "status", "stats", "health", "info"]

[[tool.parameter]]
name = "layer"
param_type = "string"
description = "Specific layer: global, project, user, conversation (default: all)."
required = false
