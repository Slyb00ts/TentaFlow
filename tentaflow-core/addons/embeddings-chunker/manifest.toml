[addon]
id = "embeddings-chunker"
name = "Embeddings Chunker"
version = "0.1.0"
description = "Intelligent text chunking and embedding generation with Jina v5."
category = "ai"
keywords = ["embedding", "embeddings", "chunking", "chunk", "vector", "text", "Jina", "LoRA", "semantic"]
author = "TentaFlow"
license = "Apache-2.0"
homepage = ""
icon = "rag-db"
runtime = "wasmtime"
platforms = ["linux", "macos", "windows", "ios", "android"]
wasm_file = "addon.wasm"

[[permission]]
id = "storage.read"
display_name = "Read addon storage"
description = "Read cached chunks and vectors from addon storage."
risk = "low"

[[permission]]
id = "storage.write"
display_name = "Write addon storage"
description = "Persist generated chunks and vectors in addon storage."
risk = "medium"

[[permission]]
id = "events.publish"
display_name = "Publish events"
description = "Emit chunker progress and completion events."
risk = "low"

[[permission]]
id = "events.subscribe"
display_name = "Subscribe to events"
description = "Listen for ingestion requests from other addons."
risk = "low"

[[permission]]
id = "llm.generate"
display_name = "Generate with LLM"
description = "Run the embedding model to produce vectors for text."
risk = "medium"

[visibility]
admin_only = false
default_groups = []
show_in_catalog = true

[resources]
memory_mb = 512
storage_mb = 500
llm_tokens_per_min = 200000
http_requests_per_min = 60

[lifecycle]
background = false
auto_start = true

[config.schema]
embedding_model = { type = "string", label = "Embedding model (name or alias)", default = "jina-embeddings-v5-text-small" }
chunk_size = { type = "number", label = "Chunk size (tokens)", default = 512 }
chunk_overlap = { type = "number", label = "Chunk overlap (tokens)", default = 50 }
embedding_dimensions = { type = "number", label = "Vector dimensions (1024/512/256/128/64/32)", default = 1024 }
task_adapter = { type = "string", label = "LoRA adapter (retrieval/text-matching/clustering/classification)", default = "retrieval" }
batch_size = { type = "number", label = "Batch size (chunks per call)", default = 32 }

[[tool]]
id = "embed_text"
display_name = "Embed a single text"
description = "Generate embedding for text. Automatically adds Document: or Query: prefix based on mode."
keywords = ["embedding", "vector", "text", "generate", "encode", "represent"]

[[tool.parameter]]
name = "text"
param_type = "string"
description = "Text to generate embedding for."
required = true

[[tool.parameter]]
name = "mode"
param_type = "string"
description = "Mode: 'query' (prefix Query:) or 'document' (prefix Document:). Default: 'document'."
required = false

[[tool.parameter]]
name = "task"
param_type = "string"
description = "LoRA adapter: retrieval, text-matching, clustering, classification."
required = false

[[tool]]
id = "embed_chunks"
display_name = "Chunk and embed"
description = "Split text into chunks and generate embeddings for each. Returns array of {chunk_text, vector, chunk_index}."
keywords = ["chunk", "chunking", "split", "embedding", "vector", "segment"]

[[tool.parameter]]
name = "text"
param_type = "string"
description = "Text to split into chunks and generate embeddings for."
required = true

[[tool.parameter]]
name = "mode"
param_type = "string"
description = "Mode: 'query' or 'document'. Default: 'document'."
required = false

[[tool.parameter]]
name = "chunk_size"
param_type = "number"
description = "Override chunk size (optional)."
required = false

[[tool.parameter]]
name = "chunk_overlap"
param_type = "number"
description = "Override overlap (optional)."
required = false

[[tool]]
id = "embed_batch"
display_name = "Batch embed texts"
description = "Generate embeddings for an array of texts (no chunking). Each text yields one vector."
keywords = ["batch", "many", "embedding", "embeddings", "vector", "bulk"]

[[tool.parameter]]
name = "texts"
param_type = "array"
description = "Array of texts to generate embeddings for."
required = true

[[tool.parameter]]
name = "mode"
param_type = "string"
description = "Mode: 'query' or 'document'. Default: 'document'."
required = false
