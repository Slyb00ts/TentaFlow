[addon]
id = "malicious-addon"
name = "Malicious Test Addon"
version = "1.0.0"
description = "Addon that deliberately tries to break sandbox security guarantees."
category = "test"
keywords = ["test", "security", "sandbox", "malicious"]
author = "Security Tester"
license = "Apache-2.0"
homepage = ""
icon = "shield"
runtime = "wasmtime"
platforms = ["linux", "macos", "windows"]
wasm_file = "addon.wasm"

# Deliberately requests high/critical permissions to exercise denial flows.
[[permission]]
id = "storage.read"
display_name = "Read addon storage"
description = "Used to verify storage isolation between addons."
risk = "low"

[[permission]]
id = "http.request"
display_name = "Perform HTTP requests"
description = "Used to verify HTTP is denied without explicit user grant."
risk = "high"

[[permission]]
id = "secrets.read"
display_name = "Read secrets"
description = "Used to verify secrets are never exposed without grant."
risk = "high"

[[permission]]
id = "network.tcp"
display_name = "Open raw TCP sockets"
description = "Used to verify raw TCP is denied without explicit network rule."
risk = "critical"

[[permission]]
id = "network.udp"
display_name = "Open raw UDP sockets"
description = "Used to verify raw UDP is denied without explicit network rule."
risk = "critical"

[visibility]
admin_only = true
default_groups = []
show_in_catalog = false

[resources]
memory_mb = 128
storage_mb = 10

[lifecycle]
background = false
auto_start = false

[[tool]]
id = "try_steal_storage"
display_name = "Attempt cross-addon storage read"
description = "Attempt to read storage of another addon."
keywords = ["test", "storage"]

[[tool]]
id = "try_unauthorized_http"
display_name = "Attempt HTTP without permission"
description = "Attempt HTTP without runtime grant."
keywords = ["test", "http"]

[[tool]]
id = "try_unauthorized_secrets"
display_name = "Attempt secrets read without permission"
description = "Attempt to read secrets without runtime grant."
keywords = ["test", "secrets"]

[[tool]]
id = "try_unauthorized_network"
display_name = "Attempt raw network without permission"
description = "Attempt net_connect without a matching network rule."
keywords = ["test", "network"]

[[tool]]
id = "try_memory_escape"
display_name = "Attempt out-of-bounds read"
description = "Attempt to read memory outside guest bounds."
keywords = ["test", "memory"]

[[tool]]
id = "try_stack_overflow"
display_name = "Attempt stack overflow"
description = "Attempt deep recursion to overflow the guest stack."
keywords = ["test", "stack"]

[[tool]]
id = "try_infinite_loop"
display_name = "Attempt infinite loop"
description = "Attempt an infinite loop to exercise fuel metering."
keywords = ["test", "fuel"]

[[tool]]
id = "try_huge_alloc"
display_name = "Attempt huge allocation"
description = "Attempt to allocate an excessive amount of guest memory."
keywords = ["test", "alloc"]

[[tool]]
id = "try_storage_other_addon"
display_name = "Attempt storage scope break"
description = "Attempt to read storage with another addon_id."
keywords = ["test", "storage"]

[[tool]]
id = "try_overwrite_memory"
display_name = "Attempt host memory overwrite"
description = "Attempt to corrupt host memory via bad pointers."
keywords = ["test", "memory"]
