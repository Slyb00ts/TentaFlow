<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>TentaFlow - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/mesh.css">
  <link rel="stylesheet" href="css/catalog.css">
  <link rel="stylesheet" href="css/prompts.css">
  <link rel="stylesheet" href="css/models.css">
  <link rel="stylesheet" href="css/rules.css">
  <link rel="stylesheet" href="css/flows.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/addons.css">
</head>
<body>
  <!-- Ekran logowania -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="18" fill="var(--color-accent)" opacity="0.2"/>
          <circle cx="20" cy="20" r="10" fill="var(--color-accent)"/>
        </svg>
        <h1 data-i18n="login.title">TentaFlow</h1>
        <p data-i18n="login.subtitle">Router Dashboard</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username" data-i18n="login.username">Login</label>
          <input type="text" id="username" autocomplete="username" placeholder="admin" required data-i18n-placeholder="login.username">
        </div>
        <div class="form-group">
          <label for="password" data-i18n="login.password">Haslo</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="********" required data-i18n-placeholder="login.password">
        </div>
        <div id="login-error" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="login.submit">Zaloguj</button>
      </form>
    </div>
  </div>

  <!-- Glowna aplikacja (ukryta do zalogowania) -->
  <div id="app" class="app-layout" hidden>
    <!-- Przycisk hamburger (widoczny tylko na mobile) -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="28" height="28" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="18" fill="var(--color-accent)" opacity="0.2"/>
          <circle cx="20" cy="20" r="10" fill="var(--color-accent)"/>
        </svg>
        <span class="sidebar-brand">TentaFlow</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-view="services">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.services">Serwisy</span>
        </a>
        <a href="#" class="nav-item" data-view="apikeys">
          <span class="nav-icon">

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.apikeys">Klucze API</span>

          <span class="nav-label" data-i18n="nav.settings">Ustawienia</span>

              <line x1="7" y1="6" x2="17" y2="6"/><line x1="6" y1="8" x2="11" y2="16"/><line x1="18" y1="8" x2="13" y2="16"/>
            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.mesh">Mesh</span>
        </a>

              <rect x="8" y="14" width="8" height="8" rx="1"/>
            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.clusters">Clusters</span>
        </a>
        <a href="#" class="nav-item" data-view="prompts">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.flows">Flow Builder</span>
        </a>
        <a href="#" class="nav-item" data-view="chat">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.playground">Playground</span>
        </a>
        <a href="#" class="nav-item" data-view="rules">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.rules">Reguly</span>
        </a>

            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.registries">Rejestry</span>
        </a>
        <div class="nav-separator"></div>
        <a href="#" class="nav-item" data-view="addons">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

              <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
              <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
          </span>

              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span class="nav-label" data-i18n="nav.users">Uzytkownicy</span>

            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          </span>

      <div class="sidebar-footer">
        <button id="btn-logout" class="btn btn-ghost btn-sm btn-block" data-i18n="nav.logout">Wyloguj</button>
      </div>
    </aside>

    <!-- Overlay za sidebarem na mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Tresc glowna -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <div class="language-switcher">
            <button class="btn btn-ghost btn-xs" onclick="I18n.setLanguage('en')">EN</button>
            <button class="btn btn-ghost btn-xs" onclick="I18n.setLanguage('pl')">PL</button>
          </div>
          <span id="connection-status" class="status-badge status-disconnected" data-i18n="topbar.disconnected">Rozlaczony</span>
          <span id="user-display" class="user-badge">admin</span>
        </div>
      </header>
      <div id="content" class="content-area">
        <!-- Dynamiczna tresc -->
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/ws-client.js"></script>
