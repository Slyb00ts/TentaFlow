<!DOCTYPE html>
<!--
  File: test-fixtures/addon-ui-mock/dashboard.html
  Description: Mock addon UI bundle. Mirrors the postMessage client pattern
               that the upcoming addon SDK (F1c-P2) will template, so authors
               have a runnable reference today.
-->
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; connect-src 'none';">
  <title>Mock Addon UI</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #11141b; color: #e6e8ec; padding: 16px; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    button { background: #2a6df4; color: white; border: 0; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #1f5ad6; }
    pre { background: #1c2030; padding: 10px; border-radius: 6px; max-height: 240px; overflow: auto; font-size: 12px; }
    .row { margin-bottom: 12px; }
    .perms { font-size: 11px; color: #8b93a3; }
  </style>
</head>
<body>
  <h1>Addon UI mock — TentaVision dashboard</h1>
  <div class="perms" id="perms">permissions: (waiting for ui.init)</div>
  <div class="row">
    <button id="btn-aliases">List my aliases</button>
    <button id="btn-cameras">List cameras</button>
    <button id="btn-vector">Vector search</button>
    <button id="btn-notify">Notify parent</button>
    <button id="btn-bad-action">Trigger EUNKNOWN_ACTION</button>
  </div>
  <pre id="output" data-testid="output">(no output yet)</pre>
  <script>
    // Bridge client — minimal reference implementation.
    const pending = new Map();
    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || typeof data !== 'object') return;
      if (data.kind === 'response') {
        const entry = pending.get(data.id);
        if (!entry) return;
        pending.delete(data.id);
        if (data.ok) entry.resolve(data.result);
        else entry.reject(Object.assign(new Error(data.error.message), { code: data.error.code }));
        return;
      }
      if (data.kind === 'event' && data.topic === 'ui.init') {
        const perms = (data.payload && data.payload.permissions) || [];
        document.getElementById('perms').textContent = 'permissions: ' + perms.join(', ');
        document.body.dataset.ready = '1';
      }
    });

    function callParent(action, payload) {
      const id = (crypto.randomUUID && crypto.randomUUID()) || ('id-' + Math.random().toString(36).slice(2));
      return new Promise((resolve, reject) => {
        pending.set(id, { resolve, reject });
        window.parent.postMessage({ kind: 'request', id, action, payload }, '*');
        setTimeout(() => {
          if (pending.has(id)) { pending.delete(id); reject(new Error('timeout')); }
        }, 5000);
      });
    }

    function showResult(label, value) {
      const text = (value && value.stack) ? `${value.code || 'ERROR'}: ${value.message}` : JSON.stringify(value, null, 2);
      document.getElementById('output').textContent = label + '\n' + text;
    }

    document.getElementById('btn-aliases').addEventListener('click', async () => {
      try { showResult('alias.list_owned →', await callParent('alias.list_owned', {})); }
      catch (e) { showResult('alias.list_owned ERROR', e); }
    });
    document.getElementById('btn-cameras').addEventListener('click', async () => {
      try { showResult('camera.list →', await callParent('camera.list', {})); }
      catch (e) { showResult('camera.list ERROR', e); }
    });
    document.getElementById('btn-vector').addEventListener('click', async () => {
      try {
        showResult('vector.search →', await callParent('vector.search', {
          namespace: 'faces', query: [0.1, 0.2, 0.3], k: 5,
        }));
      } catch (e) { showResult('vector.search ERROR', e); }
    });
    document.getElementById('btn-notify').addEventListener('click', async () => {
      try { showResult('ui.notify →', await callParent('ui.notify', { level: 'info', message: 'Hello from mock addon' })); }
      catch (e) { showResult('ui.notify ERROR', e); }
    });
    document.getElementById('btn-bad-action').addEventListener('click', async () => {
      try { showResult('bogus.action →', await callParent('bogus.action', {})); }
      catch (e) { showResult('bogus.action ERROR', e); }
    });
  </script>
</body>
</html>
