# =============================================================================
# File:        .github/workflows/release.yml
# Description: Builds one monolithic tentaflow binary per platform with every
#              available GPU backend compiled in (CUDA + ROCm + Vulkan + RDMA
#              on Linux x86_64, CUDA + Vulkan on Linux aarch64 and Windows,
#              Metal + MLX on macOS). At runtime tentaflow / llama.cpp-style
#              ggml pick the best backend that the host actually has — same
#              binary works on NVIDIA, AMD, Intel, CPU-only without rebuild.
# =============================================================================

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: "rdma-probe,gpu-cuda,gpu-vulkan,gpu-rocm"
            cache_id: "linux-x64-all"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            features: "gpu-cuda,gpu-vulkan"
            cache_id: "linux-arm64-cuda-vulkan"
          - target: aarch64-apple-darwin
            runner: macos-latest
            # gpu-metal: wciaga llama-cpp-2/metal + whisper-rs/metal + inference-llamacpp.
            # Bez tego llama.cpp nie wchodzi w binarke na Apple Silicon, a Metal
            # jest NATYWNY backend dla tej platformy. MLX siedzi dodatkowo w
            # cfg-target `macos` wpisie w tentaflow/Cargo.toml.
            features: "gpu-metal"
            cache_id: "macos-arm64-metal"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            features: "gpu-cuda,gpu-vulkan"
            cache_id: "windows-x64-cuda-vulkan"

    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---------------------------------------------------------------------
      # Base build tools + protoc
      # ---------------------------------------------------------------------
      - name: Install base tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler cmake build-essential pkg-config \
            libssl-dev git curl ca-certificates

      - name: Install base tools (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake

      - name: Install base tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # cmake 4.x (choco default) lamie ExternalProject + VS generator
          # detekcje kompilatora -> whisper.cpp/ggml vulkan-shaders-gen
          # sub-build failuje z "No CMAKE_C_COMPILER could be found".
          # ggml supportuje cmake 3.x — pinujemy stabilne 3.31.x.
          choco install -y protoc --no-progress
          choco install -y cmake --version=3.31.6 --installargs 'ADD_CMAKE_TO_PATH=System' --no-progress
          cmake --version

      - name: Export PROTOC env
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PROTOC_PATH=$(where.exe protoc 2>/dev/null | head -n1 | tr -d '\r')
          else
            PROTOC_PATH=$(which protoc)
          fi
          echo "PROTOC=$PROTOC_PATH" >> "$GITHUB_ENV"
          "$PROTOC_PATH" --version

      # ---------------------------------------------------------------------
      # CUDA Toolkit — Linux: instalacja z oficjalnego NVIDIA apt repo,
      # Windows: Jimver z meta-package `cuda` (unika problematycznych sub-pkg
      # nazw ktore Jimver mapuje niepoprawnie: cublas_dev -> cuda-cublas_dev-12-6,
      # ktory w NVIDIA repo nie istnieje).
      # ---------------------------------------------------------------------
      - name: Install CUDA (Linux)
        if: runner.os == 'Linux' && contains(matrix.features, 'gpu-cuda')
        run: |
          set -eux
          if [[ "$(dpkg --print-architecture)" == "arm64" ]]; then
            REPO_ARCH="sbsa"
          else
            REPO_ARCH="x86_64"
          fi
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/${REPO_ARCH}/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          # Caly toolkit 12.6 (pelny stack — nvcc + cudart + cublas + curand + cusolver + ...).
          # Ta sama wersja co Windows (Jimver v0.2.19 wspiera max 12.6.x).
          sudo apt-get install -y cuda-toolkit-12-6
          echo "CUDA_PATH=/usr/local/cuda-12.6" >> "$GITHUB_ENV"
          echo "CUDACXX=/usr/local/cuda-12.6/bin/nvcc" >> "$GITHUB_ENV"
          echo "/usr/local/cuda-12.6/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=/usr/local/cuda-12.6/lib64:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          /usr/local/cuda-12.6/bin/nvcc --version

      - name: Install CUDA (Windows) via chocolatey
        if: runner.os == 'Windows' && contains(matrix.features, 'gpu-cuda')
        shell: pwsh
        run: |
          # Jimver network + local method oba pada z exit 3772776473 na Azure
          # Windows runners (NVIDIA installer flake od strony Microsoft IO).
          # Chocolatey wraps ten sam installer ale ze swoim retry + tmp w
          # C:\ProgramData\chocolatey\lib (nie D:\a\TentaFlow/...).
          $MaxAttempts = 3
          for ($i = 1; $i -le $MaxAttempts; $i++) {
            Write-Host "Attempt $i/$MaxAttempts - choco install cuda"
            # Bez --version — chocolatey rebumpuje paczke co CUDA release,
            # a wersje typu 12.6.2.561 znikaja z indexu po kolejnych bumpach.
            # Bierzemy cokolwiek community.chocolatey.org aktualnie hostuje;
            # ggml/llama.cpp linkuja przez CUDART 12 API (API-stable), wiec
            # kazda 12.x (lub nowsze, 13.x) dziala.
            choco install cuda -y --no-progress `
              --timeout=7200 --ignore-detected-reboot
            if ($LASTEXITCODE -eq 0) {
              Write-Host "CUDA install OK"
              break
            }
            if ($i -lt $MaxAttempts) {
              Write-Host "Attempt failed, waiting 30s..."
              Start-Sleep -Seconds 30
            }
          }
          if ($LASTEXITCODE -ne 0) { throw "CUDA install failed after $MaxAttempts attempts" }
          # Choco instaluje do "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.6"
          $cudaPath = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA" `
            -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending `
            | Select-Object -First 1
          if (-not $cudaPath) { throw "CUDA dir not found after install" }
          # MSBuild `CUDA <X.Y>.targets` czyta CUDA_PATH_V<X>_<Y> (versioned),
          # nie `CUDA_PATH`. Jak tego brak — CudaToolkitDir = '' → fail przy
          # whisper-rs-sys / llama-cpp-sys-2 cmake. Installer ustawia ten var
          # w machine scope, ale bieżąca pwsh sesja go nie widzi — eksportujemy
          # recznie z wyciagnietej wersji folderu v13.2 -> 13_2.
          $verTag = ($cudaPath.Name -replace '^v','') -replace '\.','_'
          echo "CUDA_PATH=$($cudaPath.FullName)" >> $env:GITHUB_ENV
          echo "CUDA_PATH_V$verTag=$($cudaPath.FullName)" >> $env:GITHUB_ENV
          echo "CUDACXX=$($cudaPath.FullName)\bin\nvcc.exe" >> $env:GITHUB_ENV
          echo "CudaToolkitDir=$($cudaPath.FullName)" >> $env:GITHUB_ENV
          echo "$($cudaPath.FullName)\bin" >> $env:GITHUB_PATH
          Write-Host "CUDA_PATH_V$verTag = $($cudaPath.FullName)"
          & "$($cudaPath.FullName)\bin\nvcc.exe" --version

      # ---------------------------------------------------------------------
      # Vulkan SDK — Linux i Windows (macOS ma Metal, nie potrzebuje)
      # ---------------------------------------------------------------------
      - name: Install Vulkan SDK (Linux x86_64)
        if: runner.os == 'Linux' && contains(matrix.features, 'gpu-vulkan') && runner.arch == 'X64'
        run: |
          # LunarG repo ma paczki vulkan-sdk tylko dla x86_64
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan.list \
            "https://packages.lunarg.com/vulkan/lunarg-vulkan-${CODENAME}.list"
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk
          vulkaninfo --summary || true

      - name: Install Vulkan (Linux aarch64)
        if: runner.os == 'Linux' && contains(matrix.features, 'gpu-vulkan') && runner.arch == 'ARM64'
        run: |
          # LunarG nie ma paczek ARM; uzywamy Ubuntu-systemowych. ggml-vulkan
          # wymaga `glslc` (shaderc, Google) do kompilacji shaderow — to OSOBNY
          # binarka od `glslang-tools` ktory ma tylko glslangValidator.
          sudo apt-get install -y \
            libvulkan-dev vulkan-tools \
            glslc glslang-tools spirv-tools
          vulkaninfo --summary || true
          which glslc && glslc --version | head -2

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows' && contains(matrix.features, 'gpu-vulkan')
        shell: pwsh
        run: |
          # Chocolatey's vulkan-sdk package runs LunarG's silent installer,
          # tracks the latest version (URLs change), and lands in standard
          # C:\VulkanSDK\<ver>\ layout that FindVulkan.cmake finds via VULKAN_SDK.
          choco install vulkan-sdk -y --no-progress
          # Choco doesn't always export VULKAN_SDK to GITHUB_ENV — find it.
          $sdk = Get-ChildItem C:\VulkanSDK -Directory `
                 | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "No Vulkan SDK directory under C:\VulkanSDK after install" }
          echo "VULKAN_SDK=$($sdk.FullName)" >> $env:GITHUB_ENV
          echo "$($sdk.FullName)\Bin" >> $env:GITHUB_PATH
          Write-Host "VULKAN_SDK=$($sdk.FullName)"
          if (-not (Test-Path "$($sdk.FullName)\Include\vulkan\vulkan.h")) {
            throw "vulkan.h missing under $($sdk.FullName)\Include\vulkan"
          }
          if (-not (Test-Path "$($sdk.FullName)\Lib\vulkan-1.lib")) {
            throw "vulkan-1.lib missing under $($sdk.FullName)\Lib"
          }
          Write-Host "Vulkan headers + lib verified."

      # ---------------------------------------------------------------------
      # ROCm — tylko Linux x86_64 (ARM Linux ROCm = tylko Instinct, pomijamy;
      # Windows ROCm jest w preview, SDK install w CI niestabilny).
      # ---------------------------------------------------------------------
      # ---------------------------------------------------------------------
      # RDMA — Linux. Instalujemy PRZED ROCm, zeby libnl-3-dev / librdmacm1t64
      # nie wpadly w tangel z ROCm deps.
      # ---------------------------------------------------------------------
      - name: Install RDMA headers
        if: contains(matrix.features, 'rdma-probe')
        run: sudo apt-get install -y libibverbs-dev librdmacm-dev libnl-3-dev libnl-route-3-dev

      - name: Install ROCm (latest stable)
        if: contains(matrix.features, 'gpu-rocm')
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO- https://repo.radeon.com/rocm/rocm.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/rocm.gpg
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [arch=amd64] https://repo.radeon.com/rocm/apt/latest ${CODENAME} main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          # Pin=600 forsuje ROCm wersje z repo.radeon.com nad Ubuntu (500).
          # KONIECZNE — Ubuntu noble ma swoje `rocminfo 5.7.1`, `rocm-cmake 6.0.0`,
          # `hipcc 5.7.1` (stare, niekompatybilne z ROCm 7.x meta-packageami).
          # Bez pin>500 apt wybiera Ubuntu version i `rocm-hip-runtime` z AMD
          # (ktore wymaga rocminfo 1.0.0.70201 from ROCm 7) konfliktuje.
          echo -e "Package: *\nPin: release o=repo.radeon.com\nPin-Priority: 600" \
            | sudo tee /etc/apt/preferences.d/rocm-pin-600
          sudo apt-get update
          # NIE uzywamy `rocm-hip-sdk` / `rocm-hip-runtime` meta-packageow —
          # AMD CDN ma niekompletny pool dla tych meta .deb (7.2.1.70201
          # zwraca 404 na rocm-hip-runtime_*.deb mimo obecnosci w Packages
          # index). Zamiast tego instalujemy konkretne biblioteki ktorych
          # ggml-hip / llama.cpp HIP backend faktycznie potrzebuje —
          # omijamy brakujacy meta plik.
          ROCM_PKGS="hipcc hip-dev hip-runtime-amd hsa-rocr-dev \
            hipblas hipblas-dev rocblas rocblas-dev \
            rocsolver rocsolver-dev rocsparse rocsparse-dev \
            rocrand rocrand-dev hiprand-dev \
            rocm-device-libs rocm-llvm rocm-cmake comgr \
            rocthrust-dev hipcub-dev rocprim-dev"
          for attempt in 1 2 3; do
            if sudo apt-get install -y $ROCM_PKGS; then
              break
            fi
            echo "ROCm install attempt $attempt failed, retrying in 15s..."
            sleep 15
            sudo apt-get update
          done
          dpkg -s hipcc hipblas-dev rocblas-dev hip-dev >/dev/null 2>&1 \
            || { echo "ROCm install incomplete after 3 attempts"; exit 1; }
          ROCM_VERSION=$(ls -d /opt/rocm-* 2>/dev/null | sed 's|/opt/rocm-||' | sort -V | tail -n1)
          echo "Installed ROCm: ${ROCM_VERSION:-unknown}"
          echo "/opt/rocm/lib" | sudo tee /etc/ld.so.conf.d/rocm.conf
          sudo ldconfig
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"

      # ---------------------------------------------------------------------
      # Cache + build
      # ---------------------------------------------------------------------
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tentaflow/target
            tentaflow-core/target
          # matrix.features zawiera przecinki, a actions/cache ich nie przyjmuje.
          # GitHub Expression language nie ma `replace()`, wiec podajemy gotowy
          # cache_id z matrix.include (bez przecinkow, latwy do czytania).
          key: cargo-${{ matrix.cache_id }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tentaflow (all available GPU backends)
        working-directory: tentaflow
        shell: bash
        env:
          # .cargo/config.toml ustawia to w workspace, ale kiedy cargo startuje
          # z tentaflow/ i GH Actions ustawi RUSTFLAGS z innych powodow, config
          # jest ignorowany (RUSTFLAGS env wygrywa). Eksplicytnie laczymy:
          # whisper-rs-sys + llama-cpp-sys-2 bundluja kopie ggml -> linker
          # dostaje multiple definition dla wszystkich quantize_* funkcji.
          # --allow-multiple-definition bierze pierwsza definicje (ta sama
          # binarnie, wiec bez roznicy).
          # Kazda platforma ma inny linker → inna flaga na duplicate symbols:
          #   - Linux (GNU ld / rust-lld): --allow-multiple-definition
          #   - macOS (Apple ld64): -ld_classic wymusza stary linker ktory
          #     akceptuje -multiply_defined,suppress. Nowy ld64 (od Xcode 15)
          #     nie obsluguje tej flagi — ale ld_classic dalej jest dostepny.
          #   - Windows (link.exe / lld-link): /FORCE:MULTIPLE
          RUSTFLAGS: >-
            ${{
              runner.os == 'Linux' && '-C link-arg=-Wl,--allow-multiple-definition' ||
              runner.os == 'macOS' && '-C link-arg=-Wl,-ld_classic -C link-arg=-Wl,-multiply_defined,suppress' ||
              runner.os == 'Windows' && '-C link-arg=/FORCE:MULTIPLE' ||
              ''
            }}
          # MSBuild na Windows forkuje N cl.exe dla kazdego vcxproj w trybie
          # rownoleglym. TryCompile cmake'a (Debug config -> /Zi -> PDB)
          # wywoluje MSBuild w zagniezdzonym ExternalProject vulkan-shaders-gen
          # - rownolegle cl.exe wpadaja na ten sam vc143.pdb -> C1041.
          # MSBUILDMAXCPUCOUNT=1 jest czytany bezposrednio przez MSBuild
          # (nie przez cmake-rs, nie propagowany jako -D cache var), wiec
          # nie truje cmake compiler-id probe.
          MSBUILDMAXCPUCOUNT: 1
          UseMultiToolTask: "false"
        run: |
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.features }}"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # ---------------------------------------------------------------------
      # Pack artifacts
      # ---------------------------------------------------------------------
      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE="tentaflow-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp tentaflow/target/${{ matrix.target }}/release/tentaflow "$STAGE/"
          cp tentaflow/config.toml "$STAGE/config.example.toml" 2>/dev/null || true
          cp scripts/install/tentaflow.service "$STAGE/" 2>/dev/null || true
          cp scripts/install/ai.tentaflow.plist "$STAGE/" 2>/dev/null || true
          cp LICENSE README.md "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "tentaflow-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "tentaflow/target/${{ matrix.target }}/release/tentaflow.exe" "$stage/"
          Copy-Item "tentaflow/config.toml" "$stage/config.example.toml" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE","README.md" $stage -ErrorAction SilentlyContinue
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          Get-FileHash "$stage.zip" -Algorithm SHA256 | Format-List > "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tentaflow-${{ matrix.target }}
          path: |
            tentaflow-*.tar.gz
            tentaflow-*.tar.gz.sha256
            tentaflow-*.zip
            tentaflow-*.zip.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy installers into release artifacts
        run: |
          cp scripts/install/install.sh artifacts/install.sh
          cp scripts/install/install.ps1 artifacts/install.ps1

      - name: Detect pre-release tag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* || "$TAG" == *-beta* || "$TAG" == *-rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
