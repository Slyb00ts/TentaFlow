# =============================================================================
# File:        .github/workflows/release.yml
# Description: Builds tentaflow release binaries per target on every v* tag and
#              publishes a GitHub Release. install.sh/install.ps1 (bundled in
#              the release) fetch the matching archive.
# =============================================================================

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # tworzenie release + upload assetow

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install -y protoc cmake

      - name: Export PROTOC env (skip protobuf-src build)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PROTOC_PATH=$(where.exe protoc 2>/dev/null | head -n1 | tr -d '\r')
          else
            PROTOC_PATH=$(which protoc)
          fi
          if [[ -z "$PROTOC_PATH" ]]; then
            echo "protoc not found in PATH after install step" >&2
            exit 1
          fi
          echo "PROTOC=$PROTOC_PATH" >> "$GITHUB_ENV"
          echo "Using protoc: $PROTOC_PATH"
          "$PROTOC_PATH" --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tentaflow/target
            tentaflow-core/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tentaflow
        working-directory: tentaflow
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE="tentaflow-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp tentaflow/target/${{ matrix.target }}/release/tentaflow "$STAGE/"
          cp tentaflow/config.toml "$STAGE/config.example.toml" 2>/dev/null || true
          cp scripts/install/tentaflow.service "$STAGE/" 2>/dev/null || true
          cp scripts/install/ai.tentaflow.plist "$STAGE/" 2>/dev/null || true
          cp LICENSE README.md "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "tentaflow-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "tentaflow/target/${{ matrix.target }}/release/tentaflow.exe" "$stage/"
          Copy-Item "tentaflow/config.toml" "$stage/config.example.toml" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE","README.md" $stage -ErrorAction SilentlyContinue
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          Get-FileHash "$stage.zip" -Algorithm SHA256 | Format-List > "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tentaflow-${{ matrix.target }}
          path: |
            tentaflow-*.tar.gz
            tentaflow-*.tar.gz.sha256
            tentaflow-*.zip
            tentaflow-*.zip.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy installers into release artifacts
        run: |
          cp scripts/install/install.sh artifacts/install.sh
          cp scripts/install/install.ps1 artifacts/install.ps1

      - name: Detect pre-release tag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* || "$TAG" == *-beta* || "$TAG" == *-rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
