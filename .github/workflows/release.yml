# =============================================================================
# Plik: .github/workflows/release.yml
# Opis: Buduje binarki tentaflow per platforma na kazdy tag v* i publikuje
#       jako GitHub Release. install.sh/install.ps1 ze skryptu sciagaja
#       odpowiednia binarke z najnowszego release'a.
# =============================================================================

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # tworzenie release + upload assetow

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install -y protoc cmake

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tentaflow/target
            tentaflow-core/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build tentaflow
        working-directory: tentaflow
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE="tentaflow-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp tentaflow/target/${{ matrix.target }}/release/tentaflow "$STAGE/"
          cp tentaflow/config.toml "$STAGE/config.example.toml" 2>/dev/null || true
          cp scripts/install/tentaflow.service "$STAGE/" 2>/dev/null || true
          cp scripts/install/ai.tentaflow.plist "$STAGE/" 2>/dev/null || true
          cp LICENSE README.md "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          shasum -a 256 "$STAGE.tar.gz" > "$STAGE.tar.gz.sha256"

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "tentaflow-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "tentaflow/target/${{ matrix.target }}/release/tentaflow.exe" "$stage/"
          Copy-Item "tentaflow/config.toml" "$stage/config.example.toml" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE","README.md" $stage -ErrorAction SilentlyContinue
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          Get-FileHash "$stage.zip" -Algorithm SHA256 | Format-List > "$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tentaflow-${{ matrix.target }}
          path: |
            tentaflow-*.tar.gz
            tentaflow-*.tar.gz.sha256
            tentaflow-*.zip
            tentaflow-*.zip.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy installers do release
        run: |
          cp scripts/install/install.sh artifacts/install.sh
          cp scripts/install/install.ps1 artifacts/install.ps1

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
